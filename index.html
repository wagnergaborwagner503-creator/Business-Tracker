/* ===================== BEVÁSÁRLÓLISTA ===================== */
function ShoppingList({ business, products }) {
  const [items, setItems] = useState([]); // [{productId, qty}]
  const [loaded, setLoaded] = useState(false);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [pickProductId, setPickProductId] = useState('');
  const [pickQty, setPickQty] = useState(1);

  const storageKey = `shoppingList_${business.id}`;

  useEffect(() => {
    setLoaded(false);
    idbGetSetting(storageKey, []).then(list => { setItems(list || []); setLoaded(true); });
  }, [business.id]);

  useEffect(() => { if (loaded) idbSetSetting(storageKey, items); }, [items, loaded]);

  const withProduct = items.map(it => ({ ...it, product: products.find(p=>p.id===it.productId) })).filter(it => it.product);

  const materialTotals = {};
  withProduct.forEach(({ qty, product }) => {
    (product.materials||[]).forEach(m => {
      if (!m.name) return;
      const key = m.name.trim().toLowerCase();
      const needed = (Number(m.qty)||0) * qty;
      const cost = needed * (Number(m.unitCost)||0);
      if (!materialTotals[key]) materialTotals[key] = { name: m.name, unit: m.unit || 'db', qty: 0, cost: 0 };
      materialTotals[key].qty += needed;
      materialTotals[key].cost += cost;
    });
  });
  const materialList = Object.values(materialTotals).sort((a,b)=>b.cost-a.cost);
  const grandTotal = materialList.reduce((a,m)=>a+m.cost,0);

  const addItem = () => {
    if (!pickProductId) return;
    setItems(list => {
      const existing = list.find(it=>it.productId===pickProductId);
      if (existing) return list.map(it => it.productId===pickProductId ? {...it, qty: it.qty + Number(pickQty)} : it);
      return [...list, { productId: pickProductId, qty: Number(pickQty)||1 }];
    });
    setPickerOpen(false); setPickProductId(''); setPickQty(1);
  };
  const setQty = (productId, qty) => setItems(list => list.map(it => it.productId===productId ? {...it, qty: Number(qty)||0} : it));
  const removeItem = (productId) => setItems(list => list.filter(it=>it.productId!==productId));

  return (
    <div className="fade-in p-4 pb-28 space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-extrabold">Bevásárlólista</h1>
        <button onClick={()=>setPickerOpen(true)} className="btn-primary icon-circle w-10 h-10"><Icon name="plus" size={18} /></button>
      </div>

      {withProduct.length === 0 ? (
        <EmptyState icon="shoppingList" text="Adj hozzá termékeket, hogy lássad, mennyi anyag és mennyi pénz kell hozzájuk." />
      ) : (
        <>
          <div>
            <div className="font-bold mb-2">Termékek a listán</div>
            <div className="space-y-2">
              {withProduct.map(({ productId, qty, product }) => {
                const unitMaterialCost = (product.materials||[]).reduce((a,m)=>a+(Number(m.qty)||0)*(Number(m.unitCost)||0),0);
                return (
                  <div key={productId} className="card p-3">
                    <div className="flex items-center gap-3 mb-2">
                      <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:'var(--peony)', color:'var(--cacao)'}}>
                        {product.photos && product.photos[0] ? <img src={product.photos[0]} className="w-full h-full object-cover rounded-xl" /> : <Icon name="spool" size={16} />}
                      </div>
                      <div className="font-semibold text-sm truncate flex-1 min-w-0">{product.name}</div>
                      <button className="icon-circle w-7 h-7 flex-shrink-0" style={{color:'var(--danger)'}} onClick={async ()=>{ if (!(await confirmDialog(`Kiveszed a(z) "${product.name}" terméket a bevásárlólistából?`, 'Kivétel'))) return; removeItem(productId); }}><Icon name="x" size={14} /></button>
                    </div>
                    <div className="flex items-center justify-between gap-2 text-sm">
                      <span style={{color:'var(--text-dim)'}}>{fmtHUF(unitMaterialCost)} / db anyagköltség</span>
                      <div className="flex items-center gap-2 flex-shrink-0">
                        <input type="number" className="input py-1 w-16 text-center" value={qty} onChange={e=>setQty(productId, e.target.value)} />
                        <span className="font-bold">{fmtHUF(unitMaterialCost*qty)}</span>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          <div className="card p-4">
            <div className="font-bold mb-3">Szükséges anyagok összesen</div>
            {materialList.length === 0 ? (
              <div className="text-sm" style={{color:'var(--text-dim)'}}>A kiválasztott termékekhez még nincs anyagköltség-lebontás megadva (Termékek → szerkesztés → Anyagköltség-lebontás).</div>
            ) : (
              <div className="space-y-2">
                {materialList.map(m => (
                  <div key={m.name} className="flex items-center justify-between text-sm">
                    <span>{m.name} <span style={{color:'var(--text-dim)'}}>({Math.round(m.qty*100)/100} {m.unit})</span></span>
                    <span className="font-semibold">{fmtHUF(m.cost)}</span>
                  </div>
                ))}
                <div className="flex items-center justify-between pt-2 mt-1 text-base" style={{borderTop:'1px solid var(--border)'}}>
                  <span className="font-bold">Összesen</span>
                  <span className="font-extrabold" style={{color:'var(--cacao)'}}>{fmtHUF(grandTotal)}</span>
                </div>
              </div>
            )}
          </div>
        </>
      )}

      <BottomSheet open={pickerOpen} onClose={()=>setPickerOpen(false)} title="Termék hozzáadása">
        <div className="space-y-3">
          <div>
            <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Termék</label>
            <select className="input mt-1" value={pickProductId} onChange={e=>setPickProductId(e.target.value)}>
              <option value="">— válassz —</option>
              {products.map(p => <option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div>
            <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Mennyiség</label>
            <input type="number" className="input mt-1" value={pickQty} onChange={e=>setPickQty(e.target.value)} />
          </div>
          <button className="btn-primary w-full py-3 rounded-2xl font-bold" onClick={addItem}>Hozzáadás</button>
        </div>
      </BottomSheet>
    </div>
  );
}

/* ===================== EXCEL IMPORT ===================== */
function loadSheetJS() {
  return new Promise((resolve, reject) => {
    if (window.XLSX) return resolve();
    const s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

const norm = s => String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'');

function guessTargetType(sheetName) {
  const n = norm(sheetName);
  if (n.includes('bevetel')) return 'sales';
  if (n.includes('kiadas')) return 'expenses';
  if (n.includes('termek') || n.includes('raktar') || n.includes('keszlet')) return 'products';
  return 'sales';
}
function guessColMap(header, targetFields) {
  const map = {};
  targetFields.forEach(([field, label]) => {
    const target = norm(label);
    const idx = header.findIndex(h => h != null && (norm(h).includes(target) || target.includes(norm(h))));
    if (idx >= 0) map[field] = idx;
  });
  return map;
}

function ExcelImport({ business, channels, sales, expenses, products, expenseCategories, setExpenseCategories, productCategories, setProductCategories, onImported }) {
  const [step, setStep] = useState('pick'); // pick, map, done
  const [result, setResult] = useState({ added: 0, skipped: 0 });
  const [sheets, setSheets] = useState({});
  const [sheetName, setSheetName] = useState('');
  const [targetType, setTargetType] = useState('sales');
  const [colMap, setColMap] = useState({});
  const fileRef = useRef(null);

  const targetFieldsFor = (type) => type==='sales'
    ? [['productName','Termék'],['qty','Mennyiség'],['unitPrice','Egységár'],['date','Dátum'],['channel','Csatorna'],['note','Megjegyzés']]
    : type==='expenses'
    ? [['description','Leírás'],['amount','Összeg'],['date','Dátum'],['category','Kategória'],['note','Megjegyzés']]
    : [['name','Név'],['stock','Készlet'],['category','Kategória']];

  const applySheet = (name, sheetsObj) => {
    const rows = sheetsObj[name] || [];
    const header = rows[0] || [];
    const type = guessTargetType(name);
    setTargetType(type);
    setColMap(guessColMap(header, targetFieldsFor(type)));
    setSheetName(name);
  };

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    await loadSheetJS();
    const buf = await file.arrayBuffer();
    const wb = window.XLSX.read(buf, { type: 'array' });
    const parsed = {};
    wb.SheetNames.forEach(name => { parsed[name] = window.XLSX.utils.sheet_to_json(wb.Sheets[name], { header: 1, raw: true }); });
    setSheets(parsed);
    const firstDataSheet = wb.SheetNames.find(n => (parsed[n]||[]).length > 1) || wb.SheetNames[0];
    applySheet(firstDataSheet, parsed);
    setStep('map');
  };

  const rows = sheets[sheetName] || [];
  const header = rows[0] || [];
  const dataRows = rows.slice(1).filter(r => r.some(c => c !== undefined && c !== ''));
  const targetFields = targetFieldsFor(targetType);

  const doImport = async () => {
    let added = 0, skipped = 0;
    const newExpCats = new Set(expenseCategories);
    const newProdCats = new Set(productCategories);
    const saleSig = s => `${s.date}|${norm(s.productName)}|${s.qty}|${s.unitPrice}`;
    const expenseSig = e => `${e.date}|${norm(e.description)}|${e.amount}`;
    const seenSales = new Set(sales.map(saleSig));
    const seenExpenses = new Set(expenses.map(expenseSig));
    const seenProductNames = new Set(products.map(p => norm(p.name)));

    for (const row of dataRows) {
      const get = (field) => { const idx = colMap[field]; return idx === undefined || idx === '' ? undefined : row[Number(idx)]; };
      if (targetType === 'sales') {
        const productName = get('productName'); if (!productName) continue;
        const qty = Number(get('qty')) || 1;
        const unitPrice = Number(get('unitPrice')) || 0;
        let date = get('date'); date = typeof date === 'number' ? excelDateToISO(date) : (date || todayISO());
        date = date || todayISO();
        const sig = saleSig({ date, productName, qty, unitPrice });
        if (seenSales.has(sig)) { skipped++; continue; }
        seenSales.add(sig);
        const channelName = get('channel');
        const channel = channelName ? channels.find(c => norm(c.name) === norm(channelName)) : null;
        const fee = channel?.fee || 0;
        const gross = qty * unitPrice;
        const commissionAmount = Math.round(gross * (fee/100));
        await idbPut('sales', { id: uid(), businessId: business.id, date, productName: String(productName), qty, unitPrice, channelId: channel?.id || 'own_shop', fee, net: gross - commissionAmount, commissionAmount, note: get('note') ? String(get('note')) : '', tags: [] });
      } else if (targetType === 'expenses') {
        const description = get('description'); const amount = Number(get('amount'));
        if (!description || !amount) continue;
        let date = get('date'); date = typeof date === 'number' ? excelDateToISO(date) : (date || todayISO());
        date = date || todayISO();
        const sig = expenseSig({ date, description, amount });
        if (seenExpenses.has(sig)) { skipped++; continue; }
        seenExpenses.add(sig);
        let category = get('category') ? String(get('category')) : 'Egyéb';
        if (!newExpCats.has(category)) newExpCats.add(category);
        await idbPut('expenses', { id: uid(), businessId: business.id, date, category, description: String(description), amount, note: get('note') ? String(get('note')) : '', tags: [] });
      } else {
        const name = get('name'); if (!name) continue;
        if (seenProductNames.has(norm(name))) { skipped++; continue; }
        seenProductNames.add(norm(name));
        const stock = Number(get('stock')) || 0;
        let category = get('category') ? String(get('category')) : 'Egyéb';
        if (!newProdCats.has(category)) newProdCats.add(category);
        await idbPut('products', { id: uid(), businessId: business.id, name: String(name), category, cost:0, price:0, stock, photos:[], createdAt: todayISO() });
      }
      added++;
    }
    if (newExpCats.size !== expenseCategories.length) setExpenseCategories([...newExpCats]);
    if (newProdCats.size !== productCategories.length) setProductCategories([...newProdCats]);
    setResult({ added, skipped });
    setStep('done');
    onImported(added);
  };

  if (step === 'pick') {
    return (
      <div className="space-y-3">
        <div className="rounded-2xl p-3 flex items-start gap-2 text-xs" style={{background:PALETTE.dusty+'22', color:'var(--text)'}}>
          <Icon name="alert" size={15} className="flex-shrink-0 mt-0.5" style={{color:PALETTE.dusty}} />
          <span>Az Excel-importálás még nem tökéletes: az oszlop-felismerés és a dátumbecslés hibázhat, ezért <b>importálás után mindig nézd át</b> a Pénzügyek listákban a betöltött tételeket, és javítsd ki, ami nem stimmel.</span>
        </div>
        <p className="text-sm" style={{color:'var(--text-dim)'}}>Válassz egy .xlsx fájlt — pl. a projekt mellé mellékelt <b>minta_import.xlsx</b> fájlt, ami a régi raktár/bevétel/kiadás nyilvántartásodból lett rendszerezve. A program megpróbálja automatikusan felismerni az oszlopokat, de bármikor módosíthatod.</p>
        <button className="btn-primary w-full py-3 rounded-2xl font-bold" onClick={()=>fileRef.current.click()}>Fájl kiválasztása</button>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={handleFile} />
      </div>
    );
  }
  if (step === 'map') {
    return (
      <div className="space-y-3">
        <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Munkalap</label>
          <select className="input mt-1" value={sheetName} onChange={e=>applySheet(e.target.value, sheets)}>{Object.keys(sheets).map(n=><option key={n} value={n}>{n}</option>)}</select>
        </div>
        <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Ez a lap milyen adat?</label>
          <select className="input mt-1" value={targetType} onChange={e=>{ setTargetType(e.target.value); setColMap(guessColMap(header, targetFieldsFor(e.target.value))); }}>
            <option value="sales">Bevétel</option>
            <option value="expenses">Kiadás</option>
            <option value="products">Termék / készlet</option>
          </select>
        </div>
        <div className="text-xs" style={{color:'var(--text-dim)'}}>{dataRows.length} sor található ezen a lapon (fejléc nélkül). A zöld pipával jelölt mezőket automatikusan felismertük.</div>
        {targetFields.map(([field,label]) => (
          <div key={field}>
            <label className="text-xs font-semibold flex items-center gap-1.5" style={{color:'var(--text-dim)'}}>
              {label} oszlopa {colMap[field] !== undefined && <Icon name="check" size={13} style={{color:PALETTE.grass}} />}
            </label>
            <select className="input mt-1" value={colMap[field] ?? ''} onChange={e=>setColMap(m=>({...m,[field]:e.target.value}))}>
              <option value="">— nincs —</option>
              {header.map((h,i) => <option key={i} value={i}>{String(h ?? `Oszlop ${i+1}`)}</option>)}
            </select>
          </div>
        ))}
        <button className="btn-primary w-full py-3 rounded-2xl font-bold" onClick={doImport}>Importálás indítása</button>
      </div>
    );
  }
  return (
    <div className="text-center py-6">
      <div className="icon-circle w-14 h-14 mx-auto mb-2" style={{background:PALETTE.grass+'33', color:PALETTE.grass}}><Icon name="check" size={26} /></div>
      <div className="font-semibold">Importálás kész!</div>
      <div className="text-sm mt-2" style={{color:'var(--text-dim)'}}>{result.added} tétel hozzáadva{result.skipped > 0 && <>, {result.skipped} duplikátum kihagyva</>}.</div>
    </div>
  );
}

/* ===================== BEÁLLÍTÁSOK ===================== */
function Settings({ business, businesses, sales, expenses, products, channels, setChannels, expenseCategories, setExpenseCategories, productCategories, setProductCategories, theme, setTheme, autoBackup, setAutoBackup, onExportAll, onImportAll, onExportExcel, storageInfo, onOpenBusinessSwitcher }) {
  const [importOpen, setImportOpen] = useState(false);
  const importFileRef = useRef(null);
  const [newChannel, setNewChannel] = useState('');
  const [newExpCat, setNewExpCat] = useState('');
  const [newProdCat, setNewProdCat] = useState('');

  return (
    <div className="fade-in p-4 pb-28 space-y-5">
      <h1 className="text-2xl font-extrabold">Beállítások</h1>

      <div className="card p-4">
        <div className="font-bold mb-2">Vállalkozás</div>
        <div className="flex items-center justify-between">
          <span>{business.name}</span>
          <button className="chip" style={{background:'var(--bg)'}} onClick={onOpenBusinessSwitcher}>Váltás / kezelés</button>
        </div>
      </div>

      <div className="card p-4">
        <div className="font-bold mb-2">Megjelenés</div>
        <div className="flex gap-2">
          {[['light','Világos','sun'],['dark','Sötét','moon']].map(([v,l,ic]) => (
            <button key={v} onClick={()=>setTheme(v)} className="flex-1 py-2 rounded-xl font-semibold text-sm flex items-center justify-center gap-1.5" style={{background: theme===v?'var(--cacao)':'var(--bg)', color: theme===v?'#fff':'var(--text)'}}><Icon name={ic} size={15} />{l}</button>
          ))}
        </div>
      </div>

      <div className="card p-4">
        <div className="font-bold mb-2">Értékesítési csatornák</div>
        <div className="space-y-2 mb-2">
          {channels.map((c,i) => (
            <div key={c.id} className="flex items-center gap-2">
              <span className="flex-1 text-sm">{c.name}</span>
              <input type="number" className="input py-1 w-20" value={c.fee} onChange={e=>{
                const arr=[...channels]; arr[i]={...c,fee:Number(e.target.value)}; setChannels(arr);
              }} />
              <span className="text-xs" style={{color:'var(--text-dim)'}}>%</span>
              <button onClick={async ()=>{ if (!(await confirmDialog(`Biztosan törlöd a(z) "${c.name}" csatornát?`))) return; setChannels(channels.filter((_,j)=>j!==i)); }} className="icon-circle w-7 h-7" style={{color:'var(--danger)'}}><Icon name="trash" size={14} /></button>
            </div>
          ))}
        </div>
        <div className="flex gap-2">
          <input className="input" placeholder="Új csatorna neve" value={newChannel} onChange={e=>setNewChannel(e.target.value)} />
          <button className="chip" style={{background:'var(--bg)'}} onClick={()=>{ if(newChannel.trim()){ setChannels([...channels,{id:uid(),name:newChannel.trim(),fee:0}]); setNewChannel(''); } }}>+</button>
        </div>
      </div>

      <div className="card p-4">
        <div className="font-bold mb-2">Kiadás kategóriák</div>
        <div className="flex gap-2 flex-wrap mb-2">
          {expenseCategories.map((c,i) => <span key={c} className="chip flex items-center gap-1.5" style={{background:'var(--bg)'}}><Icon name={CATEGORY_ICON[c]||'tag'} size={13} />{c} <button onClick={async ()=>{ if (!(await confirmDialog(`Biztosan törlöd a(z) "${c}" kategóriát?`))) return; setExpenseCategories(expenseCategories.filter((_,j)=>j!==i)); }}><Icon name="x" size={12} /></button></span>)}
        </div>
        <div className="flex gap-2">
          <input className="input" placeholder="Új kategória" value={newExpCat} onChange={e=>setNewExpCat(e.target.value)} />
          <button className="chip" style={{background:'var(--bg)'}} onClick={()=>{ if(newExpCat.trim()){ setExpenseCategories([...expenseCategories,newExpCat.trim()]); setNewExpCat(''); } }}>+</button>
        </div>
      </div>

      <div className="card p-4">
        <div className="font-bold mb-2">Termék kategóriák</div>
        <div className="flex gap-2 flex-wrap mb-2">
          {productCategories.map((c,i) => <span key={c} className="chip flex items-center gap-1.5" style={{background:'var(--bg)'}}>{c} <button onClick={async ()=>{ if (!(await confirmDialog(`Biztosan törlöd a(z) "${c}" kategóriát?`))) return; setProductCategories(productCategories.filter((_,j)=>j!==i)); }}><Icon name="x" size={12} /></button></span>)}
        </div>
        <div className="flex gap-2">
          <input className="input" placeholder="Új kategória" value={newProdCat} onChange={e=>setNewProdCat(e.target.value)} />
          <button className="chip" style={{background:'var(--bg)'}} onClick={()=>{ if(newProdCat.trim()){ setProductCategories([...productCategories,newProdCat.trim()]); setNewProdCat(''); } }}>+</button>
        </div>
      </div>

      <div className="card p-4">
        <div className="font-bold mb-2">Excel importálás</div>
        <p className="text-xs mb-2" style={{color:'var(--text-dim)'}}>Régi excel (raktár / bevétel / kiadás) betöltése ehhez a vállalkozáshoz.</p>
        <button className="chip w-full text-center" style={{background:'var(--bg)'}} onClick={()=>setImportOpen(true)}>Excel importálása</button>
      </div>

      <div className="card p-4">
        <div className="font-bold mb-2">Adatmentés</div>
        <p className="text-xs mb-2" style={{color:'var(--text-dim)'}}>Tárhely: {storageInfo}. Rendszeresen készíts JSON mentést, hogy az adatok böngésző-ürítés esetén se vesszenek el.</p>
        <div className="flex items-center justify-between p-2.5 rounded-xl mb-2" style={{background:'var(--bg)'}}>
          <div className="pr-2">
            <div className="text-sm font-semibold">Automatikus napi JSON mentés</div>
            <div className="text-xs" style={{color:'var(--text-dim)'}}>Naponta egyszer, az app megnyitásakor automatikusan letölt egy biztonsági mentést.</div>
          </div>
          <button onClick={()=>setAutoBackup(a=>!a)} className="flex-shrink-0 w-12 h-7 rounded-full relative transition" style={{background: autoBackup?'var(--cacao)':'var(--border)'}}>
            <span className="absolute top-0.5 w-6 h-6 rounded-full bg-white transition" style={{left: autoBackup?'22px':'2px'}}></span>
          </button>
        </div>
        <div className="flex gap-2 mb-2">
          <button className="chip flex-1 flex items-center justify-center gap-1.5" style={{background:'var(--bg)'}} onClick={onExportAll}><Icon name="download" size={14} />JSON mentés</button>
          <button className="chip flex-1 flex items-center justify-center gap-1.5" style={{background:'var(--bg)'}} onClick={()=>importFileRef.current.click()}><Icon name="upload" size={14} />Visszatöltés</button>
          <input ref={importFileRef} type="file" accept="application/json" className="hidden" onChange={e=>{ if(e.target.files[0]) onImportAll(e.target.files[0]); }} />
        </div>
        <button className="chip w-full flex items-center justify-center gap-1.5" style={{background:'var(--bg)'}} onClick={onExportExcel}><Icon name="layers" size={14} />Excel exportálás (ez a vállalkozás)</button>
      </div>

      <BottomSheet open={importOpen} onClose={()=>setImportOpen(false)} title="Excel importálása">
        <ExcelImport business={business} channels={channels} sales={sales} expenses={expenses} products={products} expenseCategories={expenseCategories} setExpenseCategories={setExpenseCategories} productCategories={productCategories} setProductCategories={setProductCategories}
          onImported={(n)=>{ setTimeout(()=>{ setImportOpen(false); window.location.reload(); }, 2200); }} />
      </BottomSheet>
    </div>
  );
}

/* ===================== FŐ ALKALMAZÁS ===================== */
function App() {
  const [ready, setReady] = useState(false);
  const [businesses, setBusinesses] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [products, setProducts] = useState([]);
  const [sales, setSales] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [notes, setNotes] = useState([]);
  const [materials, setMaterials] = useState([]);
  const [channels, setChannelsState] = useState(DEFAULT_CHANNELS);
  const [expenseCategories, setExpenseCategoriesState] = useState(DEFAULT_EXPENSE_CATEGORIES);
  const [productCategories, setProductCategoriesState] = useState(DEFAULT_PRODUCT_CATEGORIES);
  const [theme, setThemeState] = useState('light');
  const [autoBackup, setAutoBackupState] = useState(true);
  const [page, setPageState] = useState('dashboard');
  const homeHandlerRef = useRef(null);
  useEffect(() => {
    if (page !== 'dashboard' && !homeHandlerRef.current) {
      const handler = () => { homeHandlerRef.current = null; setPageState('dashboard'); };
      homeHandlerRef.current = handler;
      navStack.push(handler);
      window.history.pushState({ __nav: 'home' }, '');
    } else if (page === 'dashboard' && homeHandlerRef.current) {
      const idx = navStack.lastIndexOf(homeHandlerRef.current);
      if (idx !== -1) navStack.splice(idx, 1);
      homeHandlerRef.current = null;
      suppressNextPopstate = true;
      window.history.back();
    }
  }, [page]);
  const setPage = (p) => setPageState(p);
  const [pendingTab, setPendingTab] = useState(null);
  const [switcherOpen, setSwitcherOpen] = useState(false);
  const [storageInfo, setStorageInfo] = useState('...');
  const [unprotected, setUnprotected] = useState(false);
  const [loadStuck, setLoadStuck] = useState(false);

  // Induláskor: DB betöltés + demó seedelés
  useEffect(() => {
    // A tárhely-védelem kérése ne blokkolja a betöltést — néhány böngészőben ez lassú/akadozó
    // lehet, és önmagában semmi mást nem befolyásol, csak a figyelmeztető sávot.
    (async () => {
      try {
        if (navigator.storage && navigator.storage.persist) {
          const persisted = await navigator.storage.persisted();
          if (!persisted) { const granted = await navigator.storage.persist(); setUnprotected(!granted); }
        }
      } catch (e) {}
    })();

    (async () => {
      let biz = await idbGetAll('businesses');
      if (biz.length === 0) { await seedDemoBusiness(); biz = await idbGetAll('businesses'); }
      setBusinesses(biz);

      // A független beállítás-olvasásokat egyszerre indítjuk, nem egymás után várva rájuk —
      // ez a betöltés leggyakoribb szűk keresztmetszete volt (5+ egymást követő IndexedDB kör).
      const [active0, savedChannels, savedExpCats, savedProdCats, savedTheme, savedAutoBackup] = await Promise.all([
        idbGetSetting('activeBusinessId', null),
        idbGetSetting('channels', null),
        idbGetSetting('expenseCategories', null),
        idbGetSetting('productCategories', null),
        idbGetSetting('theme', 'light'),
        idbGetSetting('autoBackupEnabled', true),
      ]);

      const active = (active0 && biz.find(b=>b.id===active0)) ? active0 : biz[0].id;
      setActiveId(active);
      if (savedChannels) setChannelsState(savedChannels);
      if (savedExpCats) setExpenseCategoriesState(savedExpCats);
      if (savedProdCats) setProductCategoriesState(savedProdCats);
      setThemeState(savedTheme);
      setAutoBackupState(savedAutoBackup);

      setReady(true);
    })();
  }, []);

  // Ha valamiért (pl. egy másik nyitott lap régi verziója blokkolja az adatbázis-frissítést)
  // túl sokáig tartana a betöltés, ne ragadjon örökre a töltő ikonon — mutassunk hibaüzenetet.
  useEffect(() => {
    if (ready) return;
    const t = setTimeout(() => setLoadStuck(true), 6000);
    return () => clearTimeout(t);
  }, [ready]);

  useEffect(() => { document.documentElement.classList.toggle('dark', theme === 'dark'); if (ready) idbSetSetting('theme', theme); }, [theme, ready]);
  useEffect(() => { if (ready) idbSetSetting('channels', channels); }, [channels, ready]);
  useEffect(() => { if (ready) idbSetSetting('expenseCategories', expenseCategories); }, [expenseCategories, ready]);
  useEffect(() => { if (ready) idbSetSetting('productCategories', productCategories); }, [productCategories, ready]);
  useEffect(() => { if (ready) idbSetSetting('autoBackupEnabled', autoBackup); }, [autoBackup, ready]);

  const reloadBusinessData = useCallback(async (businessId) => {
    if (!businessId) return;
    const [p,s,e,n,m] = await Promise.all([
      idbGetAllByBusiness('products', businessId),
      idbGetAllByBusiness('sales', businessId),
      idbGetAllByBusiness('expenses', businessId),
      idbGetAllByBusiness('notes', businessId),
      idbGetAllByBusiness('materials', businessId),
    ]);
    setProducts(p); setSales(s); setExpenses(e); setNotes(n); setMaterials(m);
  }, []);

  useEffect(() => { if (ready && activeId) reloadBusinessData(activeId); }, [ready, activeId]);

  useEffect(() => {
    if (!navigator.storage || !navigator.storage.estimate) return;
    navigator.storage.estimate().then(est => {
      const used = ((est.usage||0)/1024/1024).toFixed(1);
      const quota = ((est.quota||0)/1024/1024/1024).toFixed(1);
      setStorageInfo(`${used} MB / ~${quota} GB`);
    });
  }, [products, sales, expenses, notes]);

  const switchBusiness = (id) => { setActiveId(id); idbSetSetting('activeBusinessId', id); setPage('dashboard'); };
  const createBiz = async (name) => { const b = await createBusiness(name); setBusinesses(bs=>[...bs,b]); switchBusiness(b.id); };
  const renameBiz = async (id, name) => { const b = businesses.find(x=>x.id===id); const updated = {...b, name}; await idbPut('businesses', updated); setBusinesses(bs=>bs.map(x=>x.id===id?updated:x)); };
  const setBizAvatar = async (id, avatar) => { const b = businesses.find(x=>x.id===id); const updated = {...b, avatar}; await idbPut('businesses', updated); setBusinesses(bs=>bs.map(x=>x.id===id?updated:x)); };
  const deleteBiz = async (b) => {
    if (!(await confirmDialog(`Biztosan törlöd a(z) "${b.name}" vállalkozást minden adatával együtt?\nEz nem visszavonható.`))) return;
    await deleteBusinessCascade(b.id);
    const remaining = businesses.filter(x=>x.id!==b.id);
    setBusinesses(remaining);
    if (activeId === b.id) switchBusiness(remaining[0].id);
  };

  const nav = (targetPage, tab) => { setPage(targetPage); setPendingTab(tab||null); };

  const saveProduct = async (p) => { await idbPut('products', p); setProducts(ps => { const i=ps.findIndex(x=>x.id===p.id); if (i>=0){ const c=[...ps]; c[i]=p; return c;} return [...ps,p]; }); };
  const deleteProduct = async (id) => { await idbDelete('products', id); setProducts(ps=>ps.filter(p=>p.id!==id)); };
  const saveSale = async (s) => { await idbPut('sales', s); setSales(list => { const i=list.findIndex(x=>x.id===s.id); if (i>=0){ const c=[...list]; c[i]=s; return c;} return [...list,s]; }); };
  const deleteSale = async (id) => { await idbDelete('sales', id); setSales(list=>list.filter(x=>x.id!==id)); };
  const saveExpense = async (e) => { await idbPut('expenses', e); setExpenses(list => { const i=list.findIndex(x=>x.id===e.id); if (i>=0){ const c=[...list]; c[i]=e; return c;} return [...list,e]; }); };
  const deleteExpense = async (id) => { await idbDelete('expenses', id); setExpenses(list=>list.filter(x=>x.id!==id)); };
  const saveNote = async (n) => { await idbPut('notes', n); setNotes(list => { const i=list.findIndex(x=>x.id===n.id); if (i>=0){ const c=[...list]; c[i]=n; return c;} return [...list,n]; }); };
  const deleteNote = async (id) => { await idbDelete('notes', id); setNotes(list=>list.filter(x=>x.id!==id)); };
  const saveMaterial = async (m) => { await idbPut('materials', m); setMaterials(list => { const i=list.findIndex(x=>x.id===m.id); if (i>=0){ const c=[...list]; c[i]=m; return c;} return [...list,m]; }); };
  const deleteMaterial = async (id) => { await idbDelete('materials', id); setMaterials(list=>list.filter(x=>x.id!==id)); };

  const exportAll = async () => {
    const data = {};
    const results = await Promise.all(STORES.map(s => idbGetAll(s)));
    STORES.forEach((s,i) => { data[s] = results[i]; });
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `business-tracker-mentes-${todayISO()}.json`;
    a.click();
  };

  // Automatikus napi JSON mentés: naponta legfeljebb egyszer, alapból bekapcsolva.
  useEffect(() => {
    if (!ready || !autoBackup) return;
    (async () => {
      const lastDate = await idbGetSetting('lastAutoBackupDate', null);
      if (lastDate === todayISO()) return;
      await exportAll();
      await idbSetSetting('lastAutoBackupDate', todayISO());
    })();
  }, [ready, autoBackup]);
  const importAll = async (file) => {
    if (!(await confirmDialog('A visszatöltés felülírja a jelenlegi összes adatot.\nFolytatod?', 'Visszatöltés', false))) return;
    const text = await file.text();
    const data = JSON.parse(text);
    await idbClearAll();
    for (const s of STORES) { for (const item of (data[s]||[])) await idbPut(s, item); }
    window.location.reload();
  };

  const exportExcel = async () => {
    await loadSheetJS();
    const activeBusiness = businesses.find(b=>b.id===activeId);
    const bevetelRows = [...sales].sort((a,b)=>a.date.localeCompare(b.date)).map(s => ({
      'Dátum': s.date, 'Termék': s.productName, 'Mennyiség': s.qty, 'Egységár': s.unitPrice,
      'Bruttó': s.qty*s.unitPrice, 'Csatorna': channels.find(c=>c.id===s.channelId)?.name || '', 'Jutalék %': s.fee || 0,
      'Jutalék összeg': s.commissionAmount || 0, 'Nettó': s.net || 0, 'Fizetési mód': s.paymentMethod || '',
      'Címkék': (s.tags||[]).join(', '), 'Megjegyzés': s.note || '',
    }));
    const kiadasRows = [...expenses].sort((a,b)=>a.date.localeCompare(b.date)).map(e => ({
      'Dátum': e.date, 'Kategória': e.category, 'Leírás': e.description, 'Összeg': e.amount,
      'Link': e.link || '', 'Fizetési mód': e.paymentMethod || '', 'Címkék': (e.tags||[]).join(', '), 'Megjegyzés': e.note || '',
    }));
    const termekekRows = [...products].sort((a,b)=>a.name.localeCompare(b.name,'hu')).map(p => ({
      'Név': p.name, 'Kategória': p.category, 'Készlet': p.stock, 'Önköltség': p.cost, 'Alapár': p.price,
      'Anyagköltség (számított)': (p.materials||[]).reduce((a,m)=>a+(Number(m.qty)||0)*(Number(m.unitCost)||0),0),
    }));
    const totalRevenue = sales.reduce((a,s)=>a+(s.net??0),0);
    const totalExpense = expenses.reduce((a,e)=>a+e.amount,0);
    const osszesitoRows = [
      { 'Mutató': 'Összes bevétel (nettó)', 'Érték': totalRevenue },
      { 'Mutató': 'Összes kiadás', 'Érték': totalExpense },
      { 'Mutató': 'Profit', 'Érték': totalRevenue - totalExpense },
      { 'Mutató': 'Rendelések száma', 'Érték': sales.length },
      { 'Mutató': 'Exportálás dátuma', 'Érték': todayISO() },
    ];

    const wb = window.XLSX.utils.book_new();
    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(osszesitoRows), 'Összesítő');
    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(bevetelRows), 'Bevétel');
    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(kiadasRows), 'Kiadás');
    window.XLSX.utils.book_append_sheet(wb, window.XLSX.utils.json_to_sheet(termekekRows), 'Termékek');
    window.XLSX.writeFile(wb, `${(activeBusiness?.name||'business-tracker').replace(/[^\w\-áéíóöőúüű ]/gi,'')}-export-${todayISO()}.xlsx`);
  };

  if (!ready || !activeId) {
    return (
      <div className="min-h-screen flex flex-col items-center justify-center gap-4 p-6 text-center" style={{background:'var(--bg)'}}>
        <div className="spinner"></div>
        {loadStuck && (
          <>
            <div className="text-sm max-w-xs" style={{color:'var(--text-dim)'}}>
              A betöltés a szokásosnál tovább tart. Ha másik lapon/fülön is nyitva van ez az alkalmazás, zárd be azt, majd töltsd újra ezt az oldalt.
            </div>
            <button className="btn-primary rounded-2xl px-5 py-2.5 font-bold" onClick={()=>window.location.reload()}>Újratöltés</button>
          </>
        )}
      </div>
    );
  }

  const business = businesses.find(b=>b.id===activeId);
  const NAV = [
    ['dashboard','Főoldal','home'], ['products','Termékek','box'], ['warehouse','Raktár','layers'],
    ['finances','Pénzügyek','card'], ['more','Több','menu'],
  ];

  return (
    <div className="min-h-screen max-w-md mx-auto relative" style={{background:'var(--bg)'}}>
      {unprotected && (
        <div className="text-xs text-center py-1.5 px-3 flex items-center justify-center gap-1.5" style={{background:PALETTE.dusty, color:'#fff'}}>
          <Icon name="alert" size={13} /> A tárhely nincs védve — telepítsd az appot a kezdőképernyőre, és mentsd le rendszeresen a Beállításokban.
        </div>
      )}
      <div className="sticky top-0 z-30 flex items-center justify-between px-4 py-3" style={{background:'var(--bg)'}}>
        <button onClick={()=>setSwitcherOpen(true)} className="flex items-center gap-2.5">
          <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-bold overflow-hidden" style={{background:business.color}}>
            {business.avatar ? <img src={business.avatar} className="w-full h-full object-cover" /> : business.name.trim().charAt(0).toUpperCase()}
          </div>
          <div className="text-left">
            <div className="text-xs" style={{color:'var(--text-dim)'}}>Szia!</div>
            <div className="font-bold truncate max-w-[160px] flex items-center gap-1">{business.name}<Icon name="chevronDown" size={14} /></div>
          </div>
        </button>
        <button onClick={()=>setPage('settings')} className="icon-circle w-10 h-10" style={{background:'var(--surface)', border:'1px solid var(--border)', color:'var(--text-dim)'}}>
          <Icon name="settings" size={18} />
        </button>
      </div>

      {page === 'dashboard' && <Dashboard business={business} products={products} sales={sales} expenses={expenses} channels={channels} onNav={nav} />}
      {page === 'products' && <Products business={business} products={products} sales={sales} categories={productCategories} channels={channels} onSave={saveProduct} onDelete={deleteProduct} autoOpenNew={pendingTab==='new'} onAutoOpenHandled={()=>setPendingTab(null)} />}
      {page === 'finances' && <Finances business={business} products={products} sales={sales} expenses={expenses} channels={channels} expenseCategories={expenseCategories} onSaveSale={saveSale} onDeleteSale={deleteSale} onSaveExpense={saveExpense} onDeleteExpense={deleteExpense} initialTab={pendingTab} onAutoOpenHandled={()=>setPendingTab(null)} />}
      {page === 'stats' && <Stats sales={sales} expenses={expenses} channels={channels} expenseCategories={expenseCategories} products={products} />}
      {page === 'calculator' && <Calculator channels={channels} products={products} onSavePreset={async (preset)=>{ await idbPut('priceCalcPresets', {...preset, businessId: business.id}); notify('Kalkuláció elmentve.'); }} onSaveToProduct={(p)=>{ saveProduct({ id: uid(), businessId: business.id, category: productCategories[0], stock:0, photos:[], createdAt: todayISO(), ...p }); setPage('products'); }} />}
      {page === 'notes' && <Notes business={business} notes={notes} onSave={saveNote} onDelete={deleteNote} />}
      {page === 'shopping' && <ShoppingList business={business} products={products} />}
      {page === 'warehouse' && <Warehouse business={business} materials={materials} onSave={saveMaterial} onDelete={deleteMaterial} />}
      {page === 'settings' && <Settings business={business} businesses={businesses} sales={sales} expenses={expenses} products={products} channels={channels} setChannels={setChannelsState} expenseCategories={expenseCategories} setExpenseCategories={setExpenseCategoriesState} productCategories={productCategories} setProductCategories={setProductCategoriesState} theme={theme} setTheme={setThemeState} autoBackup={autoBackup} setAutoBackup={setAutoBackupState} onExportAll={exportAll} onImportAll={importAll} onExportExcel={exportExcel} storageInfo={storageInfo} onOpenBusinessSwitcher={()=>setSwitcherOpen(true)} />}
      {page === 'more' && (
        <div className="fade-in p-4 pb-28 space-y-3">
          <h1 className="text-2xl font-extrabold mb-2">Több</h1>
          {[['stats','Statisztika','chart'],['calculator','Árkalkulátor','calculator'],['shopping','Bevásárlólista','shoppingList'],['notes','Jegyzetek','note'],['settings','Beállítások','settings']].map(([id,label,icon]) => (
            <button key={id} onClick={()=>setPage(id)} className="card p-4 w-full flex items-center gap-3 text-left">
              <div className="icon-circle w-10 h-10" style={{background:'var(--peony)', color:'var(--cacao)'}}><Icon name={icon} size={18} /></div>
              <span className="font-semibold">{label}</span>
              <span className="ml-auto" style={{color:'var(--text-dim)'}}><Icon name="chevronRight" size={16} /></span>
            </button>
          ))}
        </div>
      )}

      <div className="fixed bottom-0 left-0 right-0 z-40" style={{paddingBottom:'max(env(safe-area-inset-bottom), 12px)'}}>
        <div className="max-w-md mx-auto px-4">
          <div className="flex items-stretch justify-between px-2 py-2 nav-pill" style={{background:'var(--surface)'}}>
            {NAV.map(([id,label,icon]) => {
              const active = page===id || (id==='more' && ['stats','calculator','shopping','notes','settings'].includes(page));
              return (
                <button key={id} onClick={()=>{ setPage(id); setPendingTab(null); }} className="flex-1 flex flex-col items-center gap-0.5 py-1.5 rounded-full transition"
                  style={{color: active ? '#fff' : 'var(--text-dim)', background: active ? 'var(--cacao)' : 'transparent', margin:'0 2px', minWidth:0}}>
                  <Icon name={icon} size={19} />
                  <span className="text-[10px] font-semibold">{label}</span>
                </button>
              );
            })}
          </div>
        </div>
      </div>

      <BusinessSwitcher open={switcherOpen} onClose={()=>setSwitcherOpen(false)} businesses={businesses} activeId={activeId}
        onSwitch={switchBusiness} onCreate={createBiz} onDelete={deleteBiz} onRename={renameBiz} onSetAvatar={setBizAvatar} />
      <ConfirmHost />
      <ToastHost />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}
</script>
</body>
</html>
