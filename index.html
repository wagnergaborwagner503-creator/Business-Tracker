  .sheet{ animation: slideUp .22s ease; }

  @keyframes spin{ to{ transform: rotate(360deg); } }
</style>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

/* ===================== KONSTANSOK ===================== */
const PALETTE = { peony:'#F7DDD5', dusty:'#D8A4AF', cacao:'#6B403B', lavender:'#CCC3D1', leaf:'#C1BC77', grass:'#8D8B4C', jungle:'#65613F', sky:'#AFB8CD' };
const CHART_COLORS = [PALETTE.dusty, PALETTE.sky, PALETTE.leaf, PALETTE.grass, PALETTE.lavender, PALETTE.cacao, PALETTE.jungle, PALETTE.peony];

const DEFAULT_CHANNELS = [
  { id:'own_shop', name:'Saját webshop', fee:0 },
  { id:'shopify', name:'Shopify', fee:2.9 },
  { id:'etsy', name:'Etsy', fee:12.7 },
  { id:'meska', name:'Meska', fee:12.7 },
  { id:'market', name:'Vásár / helyi piac', fee:0 },
  { id:'social', name:'Saját / Instagram / Facebook', fee:0 },
];
const DEFAULT_EXPENSE_CATEGORIES = ['Anyag', 'Csomagolás', 'Posta', 'Hirdetés', 'Helypénz', 'Eszköz', 'Egyéb'];
const DEFAULT_PRODUCT_CATEGORIES = ['Táska', 'Plüss', 'Kiegészítő', 'Egyéb'];
const PAYMENT_METHODS = ['Készpénz', 'Utalás', 'Bankkártya', 'PayPal', 'Egyéb'];
const MATERIAL_UNITS = ['db', 'm', 'cm', 'g', 'kg', 'l', 'ml', 'csomag', 'tekercs', 'gombolyag', 'pár'];
const parseTags = str => (str||'').split(',').map(t=>t.trim()).filter(Boolean);

/* ===================== SEGÉDFÜGGVÉNYEK ===================== */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const pad = n => String(n).padStart(2, '0');
const todayISO = () => { const d = new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; };
const monthKey = iso => (iso || '').slice(0, 7);
const fmtHUF = n => (Math.round(Number(n) || 0)).toLocaleString('hu-HU') + ' Ft';
const fmtDate = iso => { if (!iso) return ''; const [y,m,d] = iso.split('-'); return `${y}. ${m}. ${d}.`; };
const HU_MONTHS = ['jan.','febr.','márc.','ápr.','máj.','jún.','júl.','aug.','szept.','okt.','nov.','dec.'];
const fmtMonth = key => { const [y,m] = key.split('-').map(Number); return `${HU_MONTHS[m-1]} ${y}`; };
const excelDateToISO = serial => {
  if (typeof serial !== 'number') return null;
  const utc = Math.round((serial - 25569) * 86400 * 1000);
  const d = new Date(utc);
  if (isNaN(d.getTime())) return null;
  return `${d.getUTCFullYear()}-${pad(d.getUTCMonth()+1)}-${pad(d.getUTCDate())}`;
};

function resizeImage(file, maxDim = 900, quality = 0.8) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = height * (maxDim / width); width = maxDim; }
        else if (height > maxDim) { width = width * (maxDim / height); height = maxDim; }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = reader.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

/* ===================== INDEXEDDB RÉTEG ===================== */
const DB_NAME = 'business_tracker_db';
const DB_VERSION = 2;
const STORES = ['businesses', 'products', 'sales', 'expenses', 'notes', 'priceCalcPresets', 'materials', 'settings'];

function idbOpen() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains('businesses')) db.createObjectStore('businesses', { keyPath: 'id' });
      if (!db.objectStoreNames.contains('settings')) db.createObjectStore('settings', { keyPath: 'key' });
      ['products', 'sales', 'expenses', 'notes', 'priceCalcPresets', 'materials'].forEach(name => {
        if (!db.objectStoreNames.contains(name)) {
          const s = db.createObjectStore(name, { keyPath: 'id' });
          s.createIndex('businessId', 'businessId', { unique: false });
        }
      });
    };
    // Ha egy régebbi lapon/fülön nyitva maradt egy korábbi verziójú kapcsolat, az blokkolná ezt a
    // frissítést a végtelenségig (ez okozta, hogy frissítés után az app örökre a betöltő ikonon ragadt).
    // Ezért minden sikeresen megnyitott kapcsolatot lezárunk, amint egy újabb verzió meg akarja nyitni.
    req.onblocked = () => { console.warn('IndexedDB frissítés blokkolva — zárj be minden más megnyitott lapot ezzel az alkalmazással.'); };
    req.onsuccess = () => {
      const db = req.result;
      db.onversionchange = () => { db.close(); };
      resolve(db);
    };
    req.onerror = () => reject(req.error);
  });
}

let dbPromise = null;
const getDB = () => dbPromise || (dbPromise = idbOpen());

async function idbGetAll(store) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction(store, 'readonly').objectStore(store).getAll();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbGetAllByBusiness(store, businessId) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const idx = db.transaction(store, 'readonly').objectStore(store).index('businessId');
    const req = idx.getAll(businessId);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}
async function idbPut(store, value) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).put(value);
    tx.oncomplete = () => resolve(value);
    tx.onerror = () => reject(tx.error);
  });
}
async function idbDelete(store, id) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    tx.objectStore(store).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbDeleteByBusiness(store, businessId) {
  const items = await idbGetAllByBusiness(store, businessId);
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const os = tx.objectStore(store);
    items.forEach(it => os.delete(it.id));
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}
async function idbGetSetting(key, fallback) {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const req = db.transaction('settings', 'readonly').objectStore('settings').get(key);
    req.onsuccess = () => resolve(req.result ? req.result.value : fallback);
    req.onerror = () => reject(req.error);
  });
}
async function idbSetSetting(key, value) { return idbPut('settings', { key, value }); }
async function idbClearAll() {
  const db = await getDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORES, 'readwrite');
    STORES.forEach(s => tx.objectStore(s).clear());
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

/* ===================== ÚJ VÁLLALKOZÁS SABLON ===================== */
async function createBusiness(name) {
  const business = { id: uid(), name, color: CHART_COLORS[Math.floor(Math.random()*CHART_COLORS.length)], isDemo: false, createdAt: todayISO() };
  await idbPut('businesses', business);
  return business;
}
async function deleteBusinessCascade(businessId) {
  await Promise.all(['products','sales','expenses','notes','priceCalcPresets','materials'].map(s => idbDeleteByBusiness(s, businessId)));
  await idbDelete('businesses', businessId);
}

/* ===================== ÚJRAFELHASZNÁLHATÓ UI ===================== */
function IconBtn({ onClick, children, className='' }) {
  return <button onClick={onClick} className={`w-10 h-10 rounded-full flex items-center justify-center active:scale-90 transition ${className}`} style={{background:'var(--bg)'}}>{children}</button>;
}

function daysInMonth(monthStr) { const [y,m] = monthStr.split('-').map(Number); return new Date(y, m, 0).getDate(); }
function shiftMonth(monthStr, delta) { const [y,m] = monthStr.split('-').map(Number); const d = new Date(y, m-1+delta, 1); return `${d.getFullYear()}-${pad(d.getMonth()+1)}`; }

function MonthNav({ month, onChange, allowAll, isAll, onAll }) {
  return (
    <div className="flex items-center gap-2">
      {allowAll && (
        <button className="chip flex-shrink-0" style={{background: isAll?'var(--cacao)':'var(--bg)', color: isAll?'#fff':'var(--text)'}} onClick={onAll}>Összes</button>
      )}
      {!isAll && (
        <div className="flex items-center gap-1 flex-1 card px-1 py-1">
          <button className="icon-circle w-9 h-9 flex-shrink-0" style={{color:'var(--text-dim)'}} onClick={()=>onChange(shiftMonth(month,-1))}><Icon name="chevronLeft" size={16} /></button>
          <div className="flex-1 text-center font-bold text-sm">{fmtMonth(month)}</div>
          <button className="icon-circle w-9 h-9 flex-shrink-0" style={{color:'var(--text-dim)'}} onClick={()=>onChange(shiftMonth(month,1))}><Icon name="chevronRight" size={16} /></button>
        </div>
      )}
    </div>
  );
}

/* ===================== ALKALMAZÁSON BELÜLI MEGERŐSÍTÉS / ÉRTESÍTÉS ===================== */
// Semmilyen natív window.alert/confirm ablakot nem használunk (azok az oldal címét is
// megmutatják és kilógnak az app dizájnjából) — helyette ezt a két saját komponenst.
let _confirmImpl = null;
function confirmDialog(message, confirmLabel = 'Törlés', danger = true) {
  return new Promise(resolve => {
    if (_confirmImpl) _confirmImpl({ message, confirmLabel, danger, resolve });
    else resolve(true);
  });
}
function ConfirmHost() {
  const [state, setState] = useState(null);
  useEffect(() => { _confirmImpl = (s) => setState(s); return () => { _confirmImpl = null; }; }, []);
  useBackButton(!!state, () => { if (state) { const r = state.resolve; setState(null); r(false); } });
  if (!state) return null;
  const close = (result) => { const r = state.resolve; setState(null); r(result); };
  return (
    <div className="fixed inset-0 z-[70] flex items-center justify-center p-6" onClick={()=>close(false)}>
      <div className="absolute inset-0 bg-black/50"></div>
      <div className="sheet relative card p-5 w-full max-w-xs" onClick={e=>e.stopPropagation()}>
        <div className="font-semibold mb-4 text-center whitespace-pre-line">{state.message}</div>
        <div className="flex gap-2">
          <button className="chip flex-1 text-center font-semibold" style={{background:'var(--bg)'}} onClick={()=>close(false)}>Mégse</button>
          <button className="chip flex-1 text-center font-bold text-white" style={{background: state.danger?'var(--danger)':'var(--cacao)'}} onClick={()=>close(true)}>{state.confirmLabel}</button>
        </div>
      </div>
    </div>
  );
}

let _toastImpl = null;
function notify(message) { if (_toastImpl) _toastImpl(message); }
function ToastHost() {
  const [msg, setMsg] = useState(null);
  useEffect(() => { _toastImpl = (m) => setMsg(m); return () => { _toastImpl = null; }; }, []);
  useEffect(() => { if (!msg) return; const t = setTimeout(()=>setMsg(null), 2800); return ()=>clearTimeout(t); }, [msg]);
  if (!msg) return null;
  return (
    <div className="fixed left-1/2 z-[70] px-4 py-3 rounded-2xl text-sm font-semibold text-white text-center fade-in" style={{bottom:'96px', transform:'translateX(-50%)', background:'var(--cacao)', maxWidth:'88vw', boxShadow:'0 8px 24px rgba(0,0,0,.25)'}}>
      {msg}
    </div>
  );
}

function BottomSheet({ open, onClose, title, children }) {
  useBackButton(open, onClose);
  const [dragY, setDragY] = useState(0);
  const draggingRef = useRef(false);
  const startYRef = useRef(0);

  useEffect(() => { if (!open) setDragY(0); }, [open]);

  const onDragStart = (e) => {
    startYRef.current = e.clientY;
    draggingRef.current = true;
    try { e.target.setPointerCapture(e.pointerId); } catch(err) {}
  };
  const onDragMove = (e) => {
    if (!draggingRef.current) return;
    const delta = e.clientY - startYRef.current;
    if (delta > 0) setDragY(delta);
  };
  const onDragEnd = () => {
    if (!draggingRef.current) return;
    draggingRef.current = false;
    setDragY(y => { if (y > 120) { onClose(); } return 0; });
  };

  if (!open) return null;
  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center" onClick={onClose}>
      <div className="absolute inset-0 bg-black/40" style={{opacity: Math.max(0, 1 - dragY/250)}}></div>
      <div className="sheet relative w-full max-w-md rounded-t-3xl p-5 pb-8 max-h-[88vh] overflow-y-auto"
        style={{background:'var(--surface)', transform: dragY ? `translateY(${dragY}px)` : undefined, transition: draggingRef.current ? 'none' : 'transform .25s ease'}}
        onClick={e=>e.stopPropagation()}>
        <div className="-mt-2 -mx-2 pt-2 pb-3 px-2 mb-2" style={{touchAction:'none', cursor:'grab'}}
          onPointerDown={onDragStart} onPointerMove={onDragMove} onPointerUp={onDragEnd} onPointerCancel={onDragEnd}>
          <div className="w-10 h-1.5 rounded-full mx-auto" style={{background:'var(--border)'}}></div>
        </div>
        <div className="flex items-center justify-between mb-4">
          <h2 className="text-lg font-bold">{title}</h2>
          <button onClick={onClose} className="icon-circle w-8 h-8" style={{color:'var(--text-dim)', background:'var(--bg)'}}><Icon name="x" size={16} /></button>
        </div>
        {children}
      </div>

/* ===================== VISSZA GOMB / HISTORY KEZELÉS ===================== */
// A telefon/böngésző vissza gombja ne az egész appból léptessen ki, hanem
// csak a legfelső nyitott réteget (sheet vagy aloldal) zárja be.
const navStack = [];
let suppressNextPopstate = false;
if (typeof window !== 'undefined') {
  window.addEventListener('popstate', () => {
    if (suppressNextPopstate) { suppressNextPopstate = false; return; }
    const top = navStack.pop();
    if (top) top();
  });
}
function useBackButton(isOpen, onClose) {
  const registered = useRef(false);
  const pushedHandlerRef = useRef(null);
  const onCloseRef = useRef(onClose);
  onCloseRef.current = onClose;
  useEffect(() => {
    if (isOpen && !registered.current) {
      registered.current = true;
      const handler = () => onCloseRef.current();
      pushedHandlerRef.current = handler;
      navStack.push(handler);
      window.history.pushState({ __nav: navStack.length }, '');
    } else if (!isOpen && registered.current) {
      registered.current = false;
      const idx = navStack.lastIndexOf(pushedHandlerRef.current);
      if (idx !== -1) navStack.splice(idx, 1);
      pushedHandlerRef.current = null;
      suppressNextPopstate = true;
      window.history.back();
    }
  }, [isOpen]);
}

function ChartCanvas({ type, data, options, height=200 }) {
  const ref = useRef(null);
  const chartRef = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    chartRef.current = new Chart(ref.current.getContext('2d'), { type, data, options });
    return () => chartRef.current && chartRef.current.destroy();
  }, [JSON.stringify(data), type]);
  return <div style={{height}}><canvas ref={ref}></canvas></div>;
}

/* ===================== VÁLLALKOZÁS VÁLTÓ ===================== */
function BusinessSwitcher({ open, onClose, businesses, activeId, onSwitch, onCreate, onDelete, onRename, onSetAvatar }) {
  const [newName, setNewName] = useState('');
  const [renaming, setRenaming] = useState(null);
  const avatarInputRef = useRef(null);
  const avatarTargetRef = useRef(null);

  const sorted = [...businesses].sort((a,b) => {
    if (a.id===activeId) return -1;
    if (b.id===activeId) return 1;
    return a.name.localeCompare(b.name, 'hu');
  });

  const pickAvatar = (businessId) => { avatarTargetRef.current = businessId; avatarInputRef.current.click(); };
  const onAvatarFile = async (e) => {
    const file = e.target.files[0];
    if (!file || !avatarTargetRef.current) return;
    const dataUrl = await resizeImage(file, 300, 0.85);
    onSetAvatar(avatarTargetRef.current, dataUrl);
    e.target.value = '';
  };

  return (
    <BottomSheet open={open} onClose={onClose} title="Vállalkozásaim">
      <input ref={avatarInputRef} type="file" accept="image/*" className="hidden" onChange={onAvatarFile} />
      <div className="space-y-2 mb-4">
        {sorted.map(b => (
          <div key={b.id} className="flex items-center gap-3 p-3 rounded-2xl" style={{
            background: b.id===activeId ? 'var(--cacao)' : 'var(--bg)',
            border: b.id===activeId ? 'none' : '1px solid var(--border)',
          }}>
            <button onClick={()=>pickAvatar(b.id)} className="relative w-9 h-9 rounded-full flex-shrink-0 flex items-center justify-center font-bold overflow-visible" style={{background:b.color, color:'#fff'}}>
              <span className="w-full h-full rounded-full flex items-center justify-center overflow-hidden">
                {b.avatar ? <img src={b.avatar} className="w-full h-full object-cover" /> : b.name.trim().charAt(0).toUpperCase()}
              </span>
              <span className="absolute -bottom-0.5 -right-0.5 icon-circle w-4 h-4" style={{background:'var(--surface)', color:'var(--text-dim)', border:'1px solid var(--border)'}}><Icon name="camera" size={9} /></span>
            </button>
            <div className="flex-1 min-w-0" onClick={() => { onSwitch(b.id); onClose(); }}>
              {renaming === b.id ? (
                <input autoFocus className="input py-1" style={{color:'var(--text)', background:'var(--surface)'}} defaultValue={b.name}
                  onBlur={e => { onRename(b.id, e.target.value.trim() || b.name); setRenaming(null); }}
                  onKeyDown={e => { if (e.key==='Enter') e.target.blur(); }} onClick={e=>e.stopPropagation()} />
              ) : (
                <div className="font-semibold truncate flex items-center gap-2" style={{color: b.id===activeId ? '#fff' : 'var(--text)'}}>
                  {b.name}{b.isDemo && <span className="text-xs chip flex-shrink-0" style={{background: b.id===activeId ? 'rgba(255,255,255,.25)' : 'var(--lavender)', color: b.id===activeId ? '#fff' : 'var(--text)'}}>demó</span>}
                </div>
              )}
              <div className="text-xs" style={{color: b.id===activeId ? 'rgba(255,255,255,.75)' : 'var(--text-dim)'}}>{b.id===activeId ? 'Aktív' : 'Koppints a váltáshoz'}</div>
            </div>
            <button onClick={()=>setRenaming(b.id)} className="icon-circle w-8 h-8" style={{color: b.id===activeId ? '#fff' : 'var(--text-dim)', background: b.id===activeId ? 'rgba(255,255,255,.18)' : 'var(--surface)'}} title="Átnevezés"><Icon name="edit" size={16} /></button>
            {businesses.length > 1 && <button onClick={()=>onDelete(b)} className="icon-circle w-8 h-8" style={{color: b.id===activeId ? '#fff' : 'var(--danger)', background: b.id===activeId ? 'rgba(255,255,255,.18)' : 'var(--surface)'}} title="Törlés"><Icon name="trash" size={16} /></button>}
          </div>
        ))}
      </div>
      <div className="flex gap-2">
        <input className="input" placeholder="Új vállalkozás neve…" value={newName} onChange={e=>setNewName(e.target.value)} />
        <button className="btn-primary rounded-2xl px-4 font-semibold flex items-center gap-1" onClick={() => { if(newName.trim()){ onCreate(newName.trim()); setNewName(''); } }}><Icon name="plus" size={16} /> Létrehoz</button>
      </div>
    </BottomSheet>
  );
}

/* ===================== KEZDŐLAP ===================== */
function Dashboard({ business, products, sales, expenses, channels, onNav }) {
  const [month, setMonth] = useState(monthKey(todayISO()));
  const lastMonthKey = shiftMonth(month, -1);

  const monthSales = sales.filter(s => monthKey(s.date) === month);
  const monthExpenses = expenses.filter(e => monthKey(e.date) === month);
  const revenue = monthSales.reduce((a,s)=>a+(s.net ?? s.qty*s.unitPrice),0);
  const spent = monthExpenses.reduce((a,e)=>a+e.amount,0);
  const profit = revenue - spent;
  const soldQty = monthSales.reduce((a,s)=>a+s.qty,0);

  const lastMonthSales = sales.filter(s => monthKey(s.date) === lastMonthKey);
  const lastMonthExpenses = expenses.filter(e => monthKey(e.date) === lastMonthKey);
  const lastProfit = lastMonthSales.reduce((a,s)=>a+(s.net??0),0) - lastMonthExpenses.reduce((a,e)=>a+e.amount,0);
  const profitChangePct = lastProfit !== 0 ? Math.round(((profit-lastProfit)/Math.abs(lastProfit))*100) : (profit>0 ? 100 : 0);

  const recent = [...sales.map(s=>({...s,kind:'sale'})), ...expenses.map(e=>({...e,kind:'expense'}))]
    .sort((a,b)=> (b.date||'').localeCompare(a.date||'')).slice(0,6);

  const channelTotals = channels
    .map(c => ({ ...c, total: monthSales.filter(s=>s.channelId===c.id).reduce((a,s)=>a+(s.net??0),0) }))
    .filter(c => c.total > 0)
    .sort((a,b)=>b.total-a.total);

  const quickActions = [
    { icon:'trending', label:'Bevétel', color:PALETTE.grass, onClick:()=>onNav('finances','sale') },
    { icon:'card', label:'Kiadás', color:PALETTE.dusty, onClick:()=>onNav('finances','expense') },
    { icon:'box', label:'Termék', color:PALETTE.sky, onClick:()=>onNav('products','new') },
    { icon:'calculator', label:'Kalkulátor', color:PALETTE.lavender, onClick:()=>onNav('calculator') },
  ];

  return (
    <div className="fade-in p-4 pb-28 space-y-5">
      <MonthNav month={month} onChange={setMonth} />

      <div className="card p-4">
        <div className="flex items-center justify-between mb-3">
          <div className="font-bold">Havi összegzés</div>
          <span className="chip flex items-center gap-1" style={{background: profitChangePct>=0 ? PALETTE.grass+'22' : PALETTE.dusty+'22', color: profitChangePct>=0 ? PALETTE.grass : PALETTE.dusty}}>
            <Icon name={profitChangePct>=0?'arrowUpRight':'arrowDownRight'} size={13} /> {Math.abs(profitChangePct)}% az előző hónaphoz
          </span>
        </div>
        <div className="grid grid-cols-3 divide-x" style={{borderColor:'var(--border)'}}>
          <div className="text-center px-1">
            <div className="text-xs mb-1" style={{color:'var(--text-dim)'}}>Bevétel</div>
            <div className="font-extrabold text-sm" style={{color:PALETTE.grass}}>{fmtHUF(revenue)}</div>
          </div>
          <div className="text-center px-1">
            <div className="text-xs mb-1" style={{color:'var(--text-dim)'}}>Kiadás</div>
            <div className="font-extrabold text-sm" style={{color:PALETTE.dusty}}>{fmtHUF(spent)}</div>
          </div>
          <div className="text-center px-1">
            <div className="text-xs mb-1" style={{color:'var(--text-dim)'}}>Profit</div>
            <div className="font-extrabold text-sm">{fmtHUF(profit)}</div>
          </div>
        </div>
        {(revenue+spent) > 0 ? (
          <div className="mt-2">
            <ChartCanvas type="doughnut" height={140} data={{
              labels: ['Bevétel','Kiadás'],
              datasets: [{ data: [revenue, spent], backgroundColor: [PALETTE.grass, PALETTE.dusty], borderWidth: 0 }],
            }} options={{
              responsive:true, maintainAspectRatio:false, circumference:180, rotation:270, cutout:'72%',
              plugins:{ legend:{ display:false }, tooltip:{ enabled:true } },
            }} />
            <div className="flex justify-center gap-6 -mt-3 text-xs">
              <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background:PALETTE.grass}}></span>Bevétel {Math.round(revenue/(revenue+spent)*100)}%</span>
              <span className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background:PALETTE.dusty}}></span>Kiadás {Math.round(spent/(revenue+spent)*100)}%</span>
            </div>
          </div>
        ) : (
          <div className="mt-4 text-xs text-center" style={{color:'var(--text-dim)'}}>Nincs még rögzített tétel ebben a hónapban.</div>
        )}
      </div>

      <div className="grid grid-cols-4 gap-2">
        {quickActions.map(a => (
          <button key={a.label} onClick={a.onClick} className="quick-tile active:scale-95 transition" style={{background:a.color+'26'}}>
            <Icon name={a.icon} size={19} style={{color:a.color}} />
            <span className="text-[11px] font-semibold" style={{color:'var(--text)'}}>{a.label}</span>
          </button>
        ))}
      </div>

      {channelTotals.length > 0 && (
        <div>
          <div className="font-bold mb-2">Csatornák (havi bevétel)</div>
          <div>
            {channelTotals.map((c,i) => (
              <div key={c.id} className="wallet-band p-4 flex items-center justify-between text-white"
                style={{ background: CHART_COLORS[i % CHART_COLORS.length], marginTop: i===0?0:-16, position:'relative', zIndex:i }}>
                <div className="flex items-center gap-3">
                  <div className="icon-circle w-9 h-9" style={{background:'rgba(255,255,255,.25)'}}><Icon name="wallet" size={17} /></div>
                  <span className="font-semibold text-sm">{c.name}</span>
                </div>
                <span className="font-bold">{fmtHUF(c.total)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div>
        <div className="font-bold mb-2">Legutóbbi tételek</div>
        {recent.length === 0 ? <EmptyState icon="note" text="Még nincs rögzített tétel." /> : (
          <div className="space-y-2">
            {recent.map(r => (
              <div key={r.id} className="card p-3 flex items-center gap-3">
                <div className="icon-circle w-10 h-10" style={{background: r.kind==='sale' ? PALETTE.grass+'22' : PALETTE.dusty+'22', color: r.kind==='sale' ? PALETTE.grass : PALETTE.dusty}}>
                  <Icon name={r.kind==='sale' ? 'arrowUpRight' : 'arrowDownRight'} size={17} />
                </div>
                <div className="min-w-0 flex-1">
                  <div className="font-semibold truncate">{r.kind==='sale' ? r.productName : r.description}</div>
                  <div className="text-xs" style={{color:'var(--text-dim)'}}>{fmtDate(r.date)} · {r.kind==='sale' ? (channels.find(c=>c.id===r.channelId)?.name || '—') : r.category}</div>
                </div>
                <div className="font-bold flex-shrink-0" style={{color: r.kind==='sale' ? PALETTE.grass : PALETTE.dusty}}>
                  {r.kind==='sale' ? '+' : '-'}{fmtHUF(r.kind==='sale' ? (r.net ?? r.qty*r.unitPrice) : r.amount)}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ===================== TERMÉKEK ===================== */
function ProductForm({ initial, onSave, onClose, categories, channels, onAddToShoppingList }) {
  const [form, setForm] = useState(initial || { name:'', category: categories[0], cost:'', price:'', stock:'', photos:[], materials:[], channelPrices:{}, prepHours:'', hourlyRate:'', growthPct:10 });
  const set = (k,v) => setForm(f => ({...f, [k]:v}));
  const fileRef = useRef(null);
  const [materialsOpen, setMaterialsOpen] = useState(false);
  const [pricingOpen, setPricingOpen] = useState(false);
  const [pricesOpen, setPricesOpen] = useState(false);

  const addPhoto = async (e) => {
    const files = Array.from(e.target.files || []);
    const dataUrls = await Promise.all(files.map(f => resizeImage(f)));
    set('photos', [...(form.photos||[]), ...dataUrls]);
  };

  const materials = form.materials || [];
  const materialTotal = materials.reduce((a,m)=>a+(Number(m.qty)||0)*(Number(m.unitCost)||0),0);
  const setMaterial = (i, key, val) => { const arr=[...materials]; arr[i] = {...arr[i], [key]:val}; set('materials', arr); };
  const addMaterial = () => set('materials', [...materials, { name:'', qty:1, unit:'db', unitCost:'' }]);

  const effectiveMaterialCost = materialTotal || Number(form.cost)||0;
  const prepHours = Number(form.prepHours)||0;
  const hourlyRate = Number(form.hourlyRate)||0;
  const growthPct = Number(form.growthPct)||0;
  const labor = prepHours * hourlyRate;
  const suggestedRevenue = (effectiveMaterialCost + labor) * (1 + growthPct/100);
  const suggestedPriceFor = (fee) => suggestedRevenue * (1 + fee/100);

  const setChannelPrice = (channelId, fee, value) => {
    const finalPrice = value === '' ? undefined : Number(value);
    set('channelPrices', { ...(form.channelPrices||{}), [channelId]: finalPrice });
    if (finalPrice !== undefined && prepHours > 0) {
      const revenue = finalPrice / (1 + fee/100);
      const laborPlusMaterial = revenue / (1 + growthPct/100);
      const newLabor = laborPlusMaterial - effectiveMaterialCost;
      set('hourlyRate', Math.max(0, Math.round(newLabor / prepHours)));
    }
  };
  const removeMaterial = (i) => set('materials', materials.filter((_,j)=>j!==i));

  return (
    <div className="space-y-3">
      <div className="flex gap-2 overflow-x-auto pb-1">
        {(form.photos||[]).map((p,i) => (
          <div key={i} className="relative flex-shrink-0">
            <img src={p} className="w-20 h-20 object-cover rounded-xl" />
            <button onClick={()=>set('photos', form.photos.filter((_,j)=>j!==i))} className="absolute -top-1 -right-1 w-5 h-5 rounded-full bg-black/60 text-white icon-circle"><Icon name="x" size={11} /></button>
          </div>
        ))}
        <button onClick={()=>fileRef.current.click()} className="w-20 h-20 rounded-xl flex items-center justify-center flex-shrink-0" style={{background:'var(--bg)', border:'1px dashed var(--border)', color:'var(--text-dim)'}}><Icon name="camera" size={22} /></button>
        <input ref={fileRef} type="file" accept="image/*" multiple className="hidden" onChange={addPhoto} />
      </div>
      <div>
        <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Termék neve</label>
        <input className="input mt-1" value={form.name} onChange={e=>set('name', e.target.value)} placeholder="pl. Sárkány mintás táska" />
      </div>
      <div>
        <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Kategória</label>
        <select className="input mt-1" value={form.category} onChange={e=>set('category', e.target.value)}>
          {categories.map(c => <option key={c} value={c}>{c}</option>)}
        </select>
      </div>
      <div className="grid grid-cols-3 gap-2">
        <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Önköltség</label><input type="number" className="input mt-1" value={form.cost} onChange={e=>set('cost', e.target.value)} /></div>
        <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Alapár</label><input type="number" className="input mt-1" value={form.price} onChange={e=>set('price', e.target.value)} /></div>
        <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Készlet</label><input type="number" className="input mt-1" value={form.stock} onChange={e=>set('stock', e.target.value)} /></div>
      </div>

      <div className="card p-3">
        <button className="w-full flex items-center justify-between" onClick={()=>setMaterialsOpen(o=>!o)}>
          <div className="flex items-center gap-2">
            <Icon name={materialsOpen ? 'chevronDown' : 'chevronRight'} size={16} style={{color:'var(--text-dim)'}} />
            <div className="font-semibold text-sm">Anyagköltség-lebontás</div>
          </div>
          {materials.length > 0 && <span className="text-xs font-bold" style={{color:'var(--text-dim)'}}>{fmtHUF(materialTotal)}</span>}
        </button>
        {materialsOpen && (
          <div className="mt-3">
            <div className="flex justify-end mb-2">
              <button className="chip" style={{background:'var(--bg)'}} onClick={addMaterial}>+ Anyag</button>
            </div>
            {materials.length === 0 ? (
              <div className="text-xs" style={{color:'var(--text-dim)'}}>Add hozzá, milyen anyagok és mennyi kell ehhez a termékhez (pl. vászon, cipzár), hogy a bevásárlólistában is szerepelhessen.</div>
            ) : (
              <div className="space-y-3">
                {materials.map((m,i) => (
                  <div key={i} className="rounded-2xl p-2.5" style={{background:'var(--bg)', border:'1px solid var(--border)'}}>
                    <div className="flex items-center gap-2 mb-2">
                      <input className="input py-1.5 flex-1" placeholder="Anyag neve (pl. vászon)" value={m.name} onChange={e=>setMaterial(i,'name',e.target.value)} />
                      <button className="icon-circle w-7 h-7 flex-shrink-0" style={{color:'var(--danger)'}} onClick={()=>removeMaterial(i)}><Icon name="x" size={14} /></button>
                    </div>
                    <div className="grid grid-cols-3 gap-2">
                      <div>
                        <label className="text-[10px] font-semibold" style={{color:'var(--text-dim)'}}>Mennyiség</label>
                        <input type="number" className="input py-1.5 mt-0.5" placeholder="1" value={m.qty} onChange={e=>setMaterial(i,'qty',e.target.value)} />
                      </div>
                      <div>
                        <label className="text-[10px] font-semibold" style={{color:'var(--text-dim)'}}>Egység</label>
                        <input className="input py-1.5 mt-0.5" placeholder="db / m / g" value={m.unit} onChange={e=>setMaterial(i,'unit',e.target.value)} />
                      </div>
                      <div>
                        <label className="text-[10px] font-semibold" style={{color:'var(--text-dim)'}}>Ft / egység</label>
                        <input type="number" className="input py-1.5 mt-0.5" placeholder="0" value={m.unitCost} onChange={e=>setMaterial(i,'unitCost',e.target.value)} />
                      </div>
                    </div>
                    <div className="text-right text-xs mt-1.5" style={{color:'var(--text-dim)'}}>Részösszeg: <b style={{color:'var(--text)'}}>{fmtHUF((Number(m.qty)||0)*(Number(m.unitCost)||0))}</b></div>
                  </div>
                ))}
                <div className="flex items-center justify-between pt-1 text-sm">
                  <span style={{color:'var(--text-dim)'}}>Összes anyagköltség</span>
                  <div className="flex items-center gap-2">
                    <span className="font-bold">{fmtHUF(materialTotal)}</span>
                    <button className="chip" style={{background:'var(--peony)', color:'var(--cacao)'}} onClick={()=>set('cost', Math.round(materialTotal))}>Átveszem önköltségnek</button>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      <div className="card p-3">
        <button className="w-full flex items-center justify-between" onClick={()=>setPricingOpen(o=>!o)}>
          <div className="flex items-center gap-2">
            <Icon name={pricingOpen ? 'chevronDown' : 'chevronRight'} size={16} style={{color:'var(--text-dim)'}} />
            <div className="font-semibold text-sm">Készítés és órabér</div>
          </div>
          {labor > 0 && <span className="text-xs font-bold" style={{color:'var(--text-dim)'}}>{fmtHUF(labor)}</span>}
        </button>
        {pricingOpen && (
          <div className="mt-3">
            <div className="text-xs mb-2" style={{color:'var(--text-dim)'}}>Mennyi idő és mekkora órabér mellett készül el egy darab — ebből számoljuk az ajánlott árakat.</div>
            <div className="grid grid-cols-2 gap-2 mb-2">
              <div><label className="text-[10px] font-semibold" style={{color:'var(--text-dim)'}}>Készítési idő (óra)</label><input type="number" className="input mt-0.5" value={form.prepHours} onChange={e=>set('prepHours', e.target.value)} placeholder="pl. 2" /></div>
              <div><label className="text-[10px] font-semibold" style={{color:'var(--text-dim)'}}>Órabér (Ft)</label><input type="number" className="input mt-0.5" value={form.hourlyRate} onChange={e=>set('hourlyRate', e.target.value)} placeholder="pl. 4000" /></div>
            </div>
            <div className="mb-2"><label className="text-[10px] font-semibold" style={{color:'var(--text-dim)'}}>Vállalkozásfejlesztésre (%)</label><input type="number" className="input mt-0.5" value={form.growthPct} onChange={e=>set('growthPct', e.target.value)} /></div>
            <div className="rounded-xl p-2.5 flex items-center justify-between text-sm" style={{background:'var(--bg)'}}>
              <span style={{color:'var(--text-dim)'}}>Munkadíj (idő × órabér)</span>
              <span className="font-bold">{fmtHUF(labor)}</span>
            </div>
          </div>
        )}
      </div>

      <div className="card p-3">
        <button className="w-full flex items-center justify-between" onClick={()=>setPricesOpen(o=>!o)}>
          <div className="flex items-center gap-2">
            <Icon name={pricesOpen ? 'chevronDown' : 'chevronRight'} size={16} style={{color:'var(--text-dim)'}} />
            <div className="font-semibold text-sm">Ajánlott ár csatornánként</div>
          </div>
        </button>
        {pricesOpen && (
          <div className="mt-3">
            <div className="text-xs mb-2" style={{color:'var(--text-dim)'}}>Anyagköltség ({fmtHUF(effectiveMaterialCost)}) + munkadíj alapján számolt ajánlás. Ha beírsz egy végleges árat, abból visszaszámoljuk az órabért.</div>
            <div className="space-y-2">
              {channels.map(c => (
                <div key={c.id} className="rounded-xl p-2.5" style={{background:'var(--bg)'}}>
                  <div className="flex items-center justify-between mb-1">
                    <span className="text-sm font-semibold truncate">{c.name} <span className="text-xs font-normal" style={{color:'var(--text-dim)'}}>({c.fee}%)</span></span>
                    <span className="text-sm" style={{color:PALETTE.grass}}>Ajánlott: <b>{fmtHUF(suggestedPriceFor(c.fee))}</b></span>
                  </div>
                  <input type="number" className="input py-1.5" placeholder="Végleges ár…" value={(form.channelPrices||{})[c.id] ?? ''} onChange={e=>setChannelPrice(c.id, c.fee, e.target.value)} />
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {initial && materials.length > 0 && onAddToShoppingList && (
        <button className="chip w-full flex items-center justify-center gap-1.5" style={{background:'var(--peony)', color:'var(--cacao)'}} onClick={()=>onAddToShoppingList(initial.id)}>
          <Icon name="shoppingList" size={15} /> Hozzáadás a bevásárlólistához
        </button>
      )}

      <button className="btn-primary w-full py-3 rounded-2xl font-bold mt-2" onClick={() => {
        if (!form.name.trim()) return;
        onSave({ ...form, cost:Number(form.cost)||0, price:Number(form.price)||0, stock:Number(form.stock)||0, materials, prepHours, hourlyRate, growthPct });
        onClose();
      }}>Mentés</button>
    </div>
  );
}

function Products({ business, products, sales, categories, channels, onSave, onDelete, autoOpenNew, onAutoOpenHandled }) {
  const [editing, setEditing] = useState(null);
  const [sheetOpen, setSheetOpen] = useState(false);
  const [filter, setFilter] = useState('Mind');

  useEffect(() => { if (autoOpenNew) { setEditing(null); setSheetOpen(true); onAutoOpenHandled(); } }, [autoOpenNew]);

  const filtered = filter==='Mind' ? products : products.filter(p=>p.category===filter);
  const soldQtyFor = (name) => sales.filter(s=>s.productName===name).reduce((a,s)=>a+(Number(s.qty)||0),0);

  const duplicateProduct = (p) => {
    const copy = { ...p, id: uid(), name: `${p.name} (másolat)`, createdAt: todayISO() };
    onSave(copy);
    setEditing(copy);
    notify('Duplikálás sikeres — most a másolatot szerkeszted.');
  };

  const addToShoppingList = async (productId) => {
    const key = `shoppingList_${business.id}`;
    const list = await idbGetSetting(key, []);
    const existing = list.find(it=>it.productId===productId);
    const updated = existing ? list.map(it=>it.productId===productId ? {...it, qty: it.qty+1} : it) : [...list, { productId, qty: 1 }];
    await idbSetSetting(key, updated);
    notify('Hozzáadva a bevásárlólistához.');
  };

  return (
    <div className="fade-in p-4 pb-28 space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-extrabold">Termékek</h1>
        <button onClick={()=>{setEditing(null); setSheetOpen(true);}} className="btn-primary icon-circle w-10 h-10"><Icon name="plus" size={18} /></button>
      </div>
      <div className="flex gap-2 overflow-x-auto pb-1">
        {['Mind', ...categories].map(c => (
          <button key={c} onClick={()=>setFilter(c)} className="chip flex-shrink-0" style={{background: filter===c ? 'var(--cacao)' : 'var(--bg)', color: filter===c ? '#fff' : 'var(--text)'}}>{c}</button>
        ))}
      </div>
      {filtered.length === 0 ? <EmptyState icon="box" text="Nincs még termék ebben a kategóriában." /> : (
        <div className="grid grid-cols-2 gap-3">
          {filtered.map(p => (
            <div key={p.id} className="card overflow-hidden" onClick={()=>{setEditing(p); setSheetOpen(true);}}>
              <div className="w-full aspect-square flex items-center justify-center" style={{background:'var(--peony)', color:'var(--cacao)'}}>
                {p.photos && p.photos[0] ? <img src={p.photos[0]} className="w-full h-full object-cover" /> : <Icon name="spool" size={34} />}
              </div>
              <div className="p-3">
                <div className="font-semibold text-sm truncate">{p.name}</div>
                <div className="text-xs" style={{color:'var(--text-dim)'}}>{p.category} · Készlet: {p.stock}</div>
                <div className="text-xs" style={{color:PALETTE.grass}}>Eladva: {soldQtyFor(p.name)} db</div>
                <div className="font-bold mt-1" style={{color:'var(--cacao)'}}>{fmtHUF(p.price)}</div>
              </div>
            </div>
          ))}
        </div>
      )}
      <BottomSheet open={sheetOpen} onClose={()=>setSheetOpen(false)} title={editing ? 'Termék szerkesztése' : 'Új termék'}>
        <ProductForm key={editing?.id || 'new'} initial={editing} categories={categories} channels={channels} onClose={()=>setSheetOpen(false)} onAddToShoppingList={addToShoppingList}
          onSave={(data)=>onSave({ id: editing?.id || uid(), businessId: business.id, createdAt: editing?.createdAt || todayISO(), ...data })} />
        {editing && (
          <div className="flex gap-2 mt-3">
            <button className="chip flex-1 flex items-center justify-center gap-1.5" style={{background:'var(--bg)'}} onClick={()=>duplicateProduct(editing)}><Icon name="layers" size={14} />Duplikálás</button>
            <button className="chip flex-1 text-center" style={{color:'var(--danger)', background:'var(--bg)'}} onClick={async ()=>{ if (!(await confirmDialog(`Biztosan törlöd a(z) "${editing.name}" terméket?`))) return; onDelete(editing.id); setSheetOpen(false); }}>Termék törlése</button>
          </div>
        )}
      </BottomSheet>
    </div>
  );
}

/* ===================== PÉNZÜGYEK ===================== */
function SaleForm({ initial, products, channels, onSave, onClose }) {
  const [form, setForm] = useState(initial || { date: todayISO(), productName:'', qty:1, unitPrice:'', channelId: channels[0]?.id, feeOverride:'', paymentMethod: PAYMENT_METHODS[0], note:'', tags:[] });
  const [tagsInput, setTagsInput] = useState((initial?.tags||[]).join(', '));
  const [autoPrice, setAutoPrice] = useState(!initial);
  const set = (k,v)=>setForm(f=>({...f,[k]:v}));

  useEffect(() => {
    if (!autoPrice) return;
    const product = products.find(p => p.name === form.productName);
    if (!product) return;
    const price = (product.channelPrices && product.channelPrices[form.channelId] != null) ? product.channelPrices[form.channelId] : product.price;
    if (price != null) set('unitPrice', price);
  }, [form.productName, form.channelId, autoPrice]);

  const channel = channels.find(c=>c.id===form.channelId) || channels[0];
  const effectiveFee = form.feeOverride !== '' && form.feeOverride !== undefined ? Number(form.feeOverride) : (channel?.fee||0);
  const gross = (Number(form.qty)||0) * (Number(form.unitPrice)||0);
  const commissionAmount = Math.round(gross * (effectiveFee/100));
  const net = gross - commissionAmount;
  return (
    <div className="space-y-3">
      <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Dátum</label><input type="date" className="input mt-1" value={form.date} onChange={e=>set('date', e.target.value)} /></div>
      <div>
        <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Termék</label>
        <input list="product-list" className="input mt-1" value={form.productName} onChange={e=>set('productName', e.target.value)} placeholder="Termék neve" />
        <datalist id="product-list">{products.map(p=><option key={p.id} value={p.name} />)}</datalist>
      </div>
      <div className="grid grid-cols-2 gap-2">
        <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Mennyiség</label><input type="number" className="input mt-1" value={form.qty} onChange={e=>set('qty', e.target.value)} /></div>
        <div>
          <label className="text-xs font-semibold flex items-center gap-1" style={{color:'var(--text-dim)'}}>Egységár {autoPrice && <span className="text-[10px]" style={{color:PALETTE.grass}}>(automatikus)</span>}</label>
          <input type="number" className="input mt-1" value={form.unitPrice} onChange={e=>{ setAutoPrice(false); set('unitPrice', e.target.value); }} />
        </div>
      </div>
      <div className="grid grid-cols-2 gap-2">
        <div>
          <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Csatorna</label>
          <select className="input mt-1" value={form.channelId} onChange={e=>{ set('channelId', e.target.value); set('feeOverride',''); }}>
            {channels.map(c => <option key={c.id} value={c.id}>{c.name} ({c.fee}%)</option>)}
          </select>
        </div>
        <div>
          <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Jutalék % (felülírható)</label>
          <input type="number" className="input mt-1" placeholder={String(channel?.fee||0)} value={form.feeOverride} onChange={e=>set('feeOverride', e.target.value)} />
        </div>
      </div>
      <div>
        <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Fizetési mód</label>
        <select className="input mt-1" value={form.paymentMethod} onChange={e=>set('paymentMethod', e.target.value)}>{PAYMENT_METHODS.map(m=><option key={m} value={m}>{m}</option>)}</select>
      </div>
      <div>
        <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Címkék (vesszővel elválasztva)</label>
        <input className="input mt-1" value={tagsInput} onChange={e=>{ setTagsInput(e.target.value); set('tags', parseTags(e.target.value)); }} placeholder="pl. karácsonyi vásár, akció" />
      </div>
      <div>
        <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Megjegyzés</label>
        <textarea className="input mt-1 min-h-[70px]" value={form.note} onChange={e=>set('note', e.target.value)} placeholder="Szabad szöveges megjegyzés…" />
      </div>
      <div className="card p-3 space-y-1 text-sm">
        <div className="flex justify-between"><span style={{color:'var(--text-dim)'}}>Bruttó</span><span className="font-semibold">{fmtHUF(gross)}</span></div>
        <div className="flex justify-between"><span style={{color:'var(--text-dim)'}}>Jutalék ({effectiveFee}%)</span><span className="font-semibold" style={{color:PALETTE.dusty}}>-{fmtHUF(commissionAmount)}</span></div>
        <div className="flex justify-between text-base"><span className="font-bold">Nettó</span><span className="font-bold" style={{color:PALETTE.grass}}>{fmtHUF(net)}</span></div>
      </div>
      <button className="btn-primary w-full py-3 rounded-2xl font-bold" onClick={()=>{
        if (!form.productName.trim()) return;
        onSave({ ...form, qty:Number(form.qty)||0, unitPrice:Number(form.unitPrice)||0, fee: effectiveFee, net, commissionAmount, feeOverride: undefined });
        onClose();
      }}>Mentés</button>
    </div>
  );
}

function ExpenseForm({ initial, categories, onSave, onClose }) {
  const [form, setForm] = useState(initial || { date: todayISO(), category: categories[0], description:'', amount:'', link:'', paymentMethod: PAYMENT_METHODS[0], note:'', tags:[] });
  const [tagsInput, setTagsInput] = useState((initial?.tags||[]).join(', '));
  const set = (k,v)=>setForm(f=>({...f,[k]:v}));
  return (
    <div className="space-y-3">
      <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Dátum</label><input type="date" className="input mt-1" value={form.date} onChange={e=>set('date', e.target.value)} /></div>
      <div>
        <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Kategória</label>
        <select className="input mt-1" value={form.category} onChange={e=>set('category', e.target.value)}>{categories.map(c=><option key={c} value={c}>{c}</option>)}</select>
      </div>
      <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Leírás</label><input className="input mt-1" value={form.description} onChange={e=>set('description', e.target.value)} placeholder="pl. Rea Tex – vászon" /></div>
      <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Összeg</label><input type="number" className="input mt-1" value={form.amount} onChange={e=>set('amount', e.target.value)} /></div>
      <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Link a beszerzés helyéhez (opcionális)</label><input type="url" className="input mt-1" value={form.link||''} onChange={e=>set('link', e.target.value)} placeholder="https://…" /></div>
      <div>
        <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Fizetési mód</label>
        <select className="input mt-1" value={form.paymentMethod} onChange={e=>set('paymentMethod', e.target.value)}>{PAYMENT_METHODS.map(m=><option key={m} value={m}>{m}</option>)}</select>
      </div>
      <div>
        <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Címkék (vesszővel elválasztva)</label>
        <input className="input mt-1" value={tagsInput} onChange={e=>{ setTagsInput(e.target.value); set('tags', parseTags(e.target.value)); }} placeholder="pl. kampány, egyszeri" />
      </div>
      <div>
        <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Megjegyzés</label>
        <textarea className="input mt-1 min-h-[70px]" value={form.note} onChange={e=>set('note', e.target.value)} placeholder="Szabad szöveges megjegyzés…" />
      </div>
      <button className="btn-primary w-full py-3 rounded-2xl font-bold" onClick={()=>{
        if (!form.description.trim() || !form.amount) return;
        onSave({ ...form, amount:Number(form.amount)||0 });
        onClose();
      }}>Mentés</button>
    </div>
  );
}

function Finances({ business, products, sales, expenses, channels, expenseCategories, onSaveSale, onDeleteSale, onSaveExpense, onDeleteExpense, initialTab, onAutoOpenHandled }) {
  const [tab, setTab] = useState('sales');
  const [sheetOpen, setSheetOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [month, setMonth] = useState(monthKey(todayISO()));
  const [showAll, setShowAll] = useState(false);

  useEffect(() => {
    if (initialTab === 'sale') { setTab('sales'); setEditing(null); setSheetOpen(true); onAutoOpenHandled(); }
    if (initialTab === 'expense') { setTab('expenses'); setEditing(null); setSheetOpen(true); onAutoOpenHandled(); }
  }, [initialTab]);

  const source = tab==='sales' ? sales : expenses;
  const filtered = showAll ? source : source.filter(item => monthKey(item.date) === month);
  const list = [...filtered].sort((a,b)=>b.date.localeCompare(a.date));

  return (
    <div className="fade-in p-4 pb-28 space-y-4">
      <h1 className="text-2xl font-extrabold">Pénzügyek</h1>
      <div className="flex rounded-2xl p-1" style={{background:'var(--bg)', border:'1px solid var(--border)'}}>
        <button onClick={()=>setTab('sales')} className="flex-1 py-2 rounded-xl font-semibold text-sm" style={{background: tab==='sales'?'var(--surface)':'transparent'}}>Bevételek</button>
        <button onClick={()=>setTab('expenses')} className="flex-1 py-2 rounded-xl font-semibold text-sm" style={{background: tab==='expenses'?'var(--surface)':'transparent'}}>Kiadások</button>
      </div>

      <MonthNav month={month} onChange={setMonth} allowAll isAll={showAll} onAll={()=>setShowAll(a=>!a)} />

      {list.length === 0 ? <EmptyState icon={tab==='sales'?'trending':'card'} text={`Nincs rögzített ${tab==='sales'?'bevétel':'kiadás'} ebben az időszakban.`} /> : (
        <div className="space-y-2">
          {list.map(item => (
            <div key={item.id} className="card p-3 flex items-center gap-3" onClick={()=>{setEditing(item); setSheetOpen(true);}}>
              <div className="icon-circle w-10 h-10" style={{background: tab==='sales'?PALETTE.grass+'22':PALETTE.dusty+'22', color: tab==='sales'?PALETTE.grass:PALETTE.dusty}}>
                <Icon name={tab==='sales' ? 'arrowUpRight' : (CATEGORY_ICON[item.category] || 'arrowDownRight')} size={17} />
              </div>
              <div className="min-w-0 flex-1">
                <div className="font-semibold truncate">{tab==='sales' ? item.productName : item.description}</div>
                <div className="text-xs" style={{color:'var(--text-dim)'}}>{fmtDate(item.date)} · {tab==='sales' ? (channels.find(c=>c.id===item.channelId)?.name||'—') : item.category}{item.paymentMethod ? ` · ${item.paymentMethod}` : ''}</div>
                {(item.tags && item.tags.length > 0) && (
                  <div className="flex gap-1 flex-wrap mt-1">
                    {item.tags.map(t => <span key={t} className="text-[10px] px-2 py-0.5 rounded-full" style={{background:'var(--bg)', color:'var(--text-dim)'}}>{t}</span>)}
                  </div>
                )}
                {item.note && <div className="text-xs mt-1 truncate italic" style={{color:'var(--text-dim)'}}>{item.note}</div>}
                {item.link && <a href={item.link} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} className="text-xs mt-1 flex items-center gap-1 underline" style={{color:'var(--accent)'}}><Icon name="link" size={12} />Beszerzés helye</a>}
              </div>
              <div className="text-right flex-shrink-0">
                <div className="font-bold" style={{color: tab==='sales'?PALETTE.grass:PALETTE.dusty}}>{fmtHUF(tab==='sales' ? item.net : item.amount)}</div>
                {tab==='sales' && item.commissionAmount > 0 && <div className="text-[10px]" style={{color:'var(--text-dim)'}}>-{fmtHUF(item.commissionAmount)} jutalék</div>}
              </div>
            </div>
          ))}
        </div>
      )}

      <button onClick={()=>{setEditing(null); setSheetOpen(true);}} className="btn-primary icon-circle fixed bottom-24 right-5 w-14 h-14 shadow-lg"><Icon name="plus" size={24} /></button>

      <BottomSheet open={sheetOpen} onClose={()=>setSheetOpen(false)} title={tab==='sales' ? (editing?'Bevétel szerkesztése':'Új bevétel') : (editing?'Kiadás szerkesztése':'Új kiadás')}>
        {tab==='sales' ? (
          <SaleForm initial={editing} products={products} channels={channels} onClose={()=>setSheetOpen(false)}
            onSave={(data)=>onSaveSale({ id: editing?.id||uid(), businessId: business.id, ...data })} />
        ) : (
          <ExpenseForm initial={editing} categories={expenseCategories} onClose={()=>setSheetOpen(false)}
            onSave={(data)=>onSaveExpense({ id: editing?.id||uid(), businessId: business.id, ...data })} />
        )}
        {editing && <button className="w-full text-center text-sm mt-3 py-2" style={{color:'var(--danger)'}} onClick={async ()=>{
          if (!(await confirmDialog(`Biztosan törlöd ezt a(z) ${tab==='sales'?'bevételt':'kiadást'}?`))) return;
          tab==='sales' ? onDeleteSale(editing.id) : onDeleteExpense(editing.id); setSheetOpen(false);
        }}>Törlés</button>}
      </BottomSheet>
    </div>
  );
}

/* ===================== ÁRKALKULÁTOR ===================== */
function Calculator({ channels, onSavePreset, onSaveToProduct, products }) {
  const [materialCost, setMaterialCost] = useState(2237);
  const [hours, setHours] = useState(4);
  const [hourlyRate, setHourlyRate] = useState(4000);
  const [growthPct, setGrowthPct] = useState(10);
  const [channelId, setChannelId] = useState(channels[0]?.id);
  const [name, setName] = useState('');

  const channel = channels.find(c=>c.id===channelId) || channels[0];
  const labor = hours * hourlyRate;
  const revenue = ((Number(materialCost)||0) + labor) * (1 + Number(growthPct)/100);
  const price = revenue * (1 + (channel?.fee||0)/100);
  const profit = labor;

  return (
    <div className="fade-in p-4 pb-28 space-y-4">
      <h1 className="text-2xl font-extrabold">Árkalkulátor</h1>
      <div className="card p-4 space-y-3">
        <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Termék neve (opcionális)</label><input className="input mt-1" value={name} onChange={e=>setName(e.target.value)} placeholder="pl. Sárkány mintás táska" /></div>
        <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Anyagköltség (önköltség)</label><input type="number" className="input mt-1" value={materialCost} onChange={e=>setMaterialCost(e.target.value)} /></div>
        <div className="grid grid-cols-2 gap-2">
          <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Készítési idő (óra)</label><input type="number" className="input mt-1" value={hours} onChange={e=>setHours(e.target.value)} /></div>
          <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Órabér</label><input type="number" className="input mt-1" value={hourlyRate} onChange={e=>setHourlyRate(e.target.value)} /></div>
        </div>
        <div><label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Vállalkozásfejlesztésre (%)</label><input type="number" className="input mt-1" value={growthPct} onChange={e=>setGrowthPct(e.target.value)} /></div>
        <div>
          <label className="text-xs font-semibold" style={{color:'var(--text-dim)'}}>Értékesítési csatorna (jutalék)</label>
          <select className="input mt-1" value={channelId} onChange={e=>setChannelId(e.target.value)}>{channels.map(c=><option key={c.id} value={c.id}>{c.name} ({c.fee}%)</option>)}</select>
        </div>
      </div>

      <div className="card p-4 space-y-2" style={{background:'var(--peony)', borderColor:'var(--dusty)'}}>
        <div className="flex justify-between"><span style={{color:'var(--text-dim)'}}>Munkadíj</span><span className="font-semibold">{fmtHUF(labor)}</span></div>
        <div className="flex justify-between"><span style={{color:'var(--text-dim)'}}>Bevétel (fejlesztéssel)</span><span className="font-semibold">{fmtHUF(revenue)}</span></div>
        <div className="flex justify-between text-lg"><span className="font-bold">Ajánlott ár</span><span className="font-extrabold" style={{color:'var(--cacao)'}}>{fmtHUF(price)}</span></div>
        <div className="flex justify-between"><span style={{color:'var(--text-dim)'}}>Profit</span><span className="font-semibold" style={{color:PALETTE.grass}}>{fmtHUF(profit)}</span></div>
      </div>

      <div className="flex gap-2">
        <button className="flex-1 py-3 rounded-2xl font-bold card" onClick={()=>onSavePreset({ id: uid(), name: name||'Névtelen kalkuláció', materialCost:Number(materialCost), hours:Number(hours), hourlyRate:Number(hourlyRate), growthPct:Number(growthPct), channelId, price, revenue, profit, createdAt: todayISO() })}>Mentés presetként</button>
        <button className="flex-1 py-3 rounded-2xl font-bold btn-primary" onClick={()=>onSaveToProduct({ name: name||'Új termék', cost:Number(materialCost), price:Math.round(price) })}>Termékké alakítás</button>
      </div>
    </div>
  );
}

/* ===================== STATISZTIKA ===================== */

function Stats({ sales, expenses, channels, expenseCategories, products }) {
  const [range, setRange] = useState('6m');
  const [selectedMonth, setSelectedMonth] = useState(monthKey(todayISO()));
  const [periodEnd, setPeriodEnd] = useState(monthKey(todayISO()));
  const isMonthMode = range === 'month';
  const isAllMode = range === 'all';
  const monthsBack = range==='3m'?3:range==='12m'?12:6;

  const changeRange = (v) => { setRange(v); setPeriodEnd(monthKey(todayISO())); };

  const allYears = [...new Set([...sales, ...expenses].map(item => (item.date||'').slice(0,4)).filter(Boolean))].sort();

  const keys = isMonthMode
    ? Array.from({length: daysInMonth(selectedMonth)}, (_,i) => `${selectedMonth}-${pad(i+1)}`)
    : isAllMode
    ? allYears
    : Array.from({length:monthsBack}, (_,i) => shiftMonth(periodEnd, -(monthsBack-1-i)));
  const keyOf = iso => isMonthMode ? iso : isAllMode ? (iso||'').slice(0,4) : monthKey(iso);

  const periodSales = isMonthMode ? sales.filter(s=>monthKey(s.date)===selectedMonth) : isAllMode ? sales : sales.filter(s=>keys.includes(monthKey(s.date)));
  const periodExpenses = isMonthMode ? expenses.filter(e=>monthKey(e.date)===selectedMonth) : isAllMode ? expenses : expenses.filter(e=>keys.includes(monthKey(e.date)));

  const revByKey = keys.map(k => periodSales.filter(s=>keyOf(s.date)===k).reduce((a,s)=>a+(s.net??0),0));
  const expByKey = keys.map(k => periodExpenses.filter(e=>keyOf(e.date)===k).reduce((a,e)=>a+e.amount,0));
  const profitByKey = keys.map((k,i)=>revByKey[i]-expByKey[i]);

  const catTotals = expenseCategories.map(c => periodExpenses.filter(e=>e.category===c).reduce((a,e)=>a+e.amount,0));
  const productTotals = {};
  periodSales.forEach(s => { productTotals[s.productName] = (productTotals[s.productName]||0) + (s.net??0); });
  const topProducts = Object.entries(productTotals).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const channelTotals = channels.map(c => ({ ...c, total: periodSales.filter(s=>s.channelId===c.id).reduce((a,s)=>a+(s.net??0),0) })).filter(c=>c.total>0);

  const totalRevenue = periodSales.reduce((a,s)=>a+(s.net??0),0);
  const totalExpense = periodExpenses.reduce((a,e)=>a+e.amount,0);
  const totalProfit = totalRevenue - totalExpense;
  const totalCommission = periodSales.reduce((a,s)=>a+(s.commissionAmount??0),0);
  const orderCount = periodSales.length;
  const aov = orderCount > 0 ? totalRevenue / orderCount : 0;
  const profitMargin = totalRevenue > 0 ? (totalProfit/totalRevenue)*100 : 0;
  const expenseRatio = totalRevenue > 0 ? (totalExpense/totalRevenue)*100 : 0;
  const bestIdx = profitByKey.length ? profitByKey.indexOf(Math.max(...profitByKey)) : -1;
  const bestKeyLabel = bestIdx >= 0 && profitByKey[bestIdx] > 0 ? (isMonthMode ? `${Number(keys[bestIdx].split('-')[2])}.` : isAllMode ? keys[bestIdx] : fmtMonth(keys[bestIdx])) : '—';

  const prevSales = isAllMode ? [] : isMonthMode ? sales.filter(s=>monthKey(s.date)===shiftMonth(selectedMonth,-1)) : sales.filter(s=>{ const k=monthKey(s.date); return !keys.includes(k) && k >= shiftMonth(keys[0],-monthsBack) && k < keys[0]; });
  const prevExpenses = isAllMode ? [] : isMonthMode ? expenses.filter(e=>monthKey(e.date)===shiftMonth(selectedMonth,-1)) : expenses.filter(e=>{ const k=monthKey(e.date); return !keys.includes(k) && k >= shiftMonth(keys[0],-monthsBack) && k < keys[0]; });
  const prevProfit = prevSales.reduce((a,s)=>a+(s.net??0),0) - prevExpenses.reduce((a,e)=>a+e.amount,0);
  const growthPct = prevProfit !== 0 ? Math.round(((totalProfit-prevProfit)/Math.abs(prevProfit))*100) : (totalProfit>0?100:0);

  const tagCounts = {};
  [...periodSales, ...periodExpenses].forEach(item => (item.tags||[]).forEach(t => { tagCounts[t] = (tagCounts[t]||0)+1; }));
  const topTags = Object.entries(tagCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);

  const marginRows = (products||[]).map(p => {
    const materialCost = (p.materials||[]).reduce((a,m)=>a+(Number(m.qty)||0)*(Number(m.unitCost)||0), 0);
    const cost = materialCost || p.cost || 0;
    const marginFt = (p.price||0) - cost;
    const marginPct = p.price ? (marginFt/p.price)*100 : 0;
    return { name: p.name, price: p.price||0, cost, marginFt, marginPct };
  }).sort((a,b)=>b.marginPct-a.marginPct);

  const kpis = [
    { label:'Rendelések száma', value: orderCount },
    { label:'Átlagos kosárérték', value: fmtHUF(aov) },
    { label:'Profit ráta', value: `${profitMargin.toFixed(0)}%` },
    { label:'Összes jutalék', value: fmtHUF(totalCommission) },
    { label:'Kiadás/bevétel arány', value: `${expenseRatio.toFixed(0)}%` },
    { label: isMonthMode ? 'Legjobb nap' : isAllMode ? 'Legjobb év' : 'Legjobb hónap', value: bestKeyLabel },
  ];

  return (
    <div className="fade-in p-4 pb-28 space-y-5">
      <h1 className="text-2xl font-extrabold">Statisztika</h1>
      <div className="flex gap-2 overflow-x-auto pb-1">
        {[['all','Összes'],['month','1 hónap'],['3m','3 hónap'],['6m','6 hónap'],['12m','1 év']].map(([v,l]) => (
          <button key={v} onClick={()=>changeRange(v)} className="chip flex-shrink-0" style={{background: range===v?'var(--cacao)':'var(--bg)', color: range===v?'#fff':'var(--text)'}}>{l}</button>
        ))}
      </div>
      {isMonthMode ? (
        <MonthNav month={selectedMonth} onChange={setSelectedMonth} />
      ) : isAllMode ? (
        <div className="card px-3 py-2.5 text-center font-bold text-sm">
          {allYears.length > 0 ? `${allYears[0]} – ${allYears[allYears.length-1]}` : 'Nincs még adat'} (teljes időszak)
        </div>
      ) : (
        <div className="flex items-center gap-1 card px-1 py-1">
          <button className="icon-circle w-9 h-9 flex-shrink-0" style={{color:'var(--text-dim)'}} onClick={()=>setPeriodEnd(shiftMonth(periodEnd,-monthsBack))}><Icon name="chevronLeft" size={16} /></button>
          <div className="flex-1 text-center font-bold text-sm">{fmtMonth(keys[0])} – {fmtMonth(keys[keys.length-1])}</div>
          <button className="icon-circle w-9 h-9 flex-shrink-0" style={{color:'var(--text-dim)'}} onClick={()=>setPeriodEnd(shiftMonth(periodEnd,monthsBack))}><Icon name="chevronRight" size={16} /></button>
        </div>
      )}

      <div className="card p-4">
        <div className="flex items-center justify-between mb-3">
          <span className="chip" style={{background:'var(--peony)', color:'var(--cacao)'}}>{isAllMode ? 'Összes profit' : 'Profit'}</span>
          {!isAllMode && (
            <span className="chip flex items-center gap-1" style={{background: growthPct>=0 ? PALETTE.grass+'22' : PALETTE.dusty+'22', color: growthPct>=0 ? PALETTE.grass : PALETTE.dusty}}>
              <Icon name={growthPct>=0?'arrowUpRight':'arrowDownRight'} size={13} /> {Math.abs(growthPct)}% az előző időszakhoz
            </span>
          )}
        </div>
        <div className="text-2xl font-extrabold">{fmtHUF(totalProfit)}</div>
        <div className="flex gap-4 mt-2 text-sm" style={{color:'var(--text-dim)'}}>
          <span>Bevétel: <b style={{color:PALETTE.grass}}>{fmtHUF(totalRevenue)}</b></span>
          <span>Kiadás: <b style={{color:PALETTE.dusty}}>{fmtHUF(totalExpense)}</b></span>
        </div>
      </div>

      <div className="grid grid-cols-2 gap-3">
        {kpis.map(k => (
          <div key={k.label} className="card p-3">
            <div className="text-xs" style={{color:'var(--text-dim)'}}>{k.label}</div>
            <div className="font-extrabold mt-1">{k.value}</div>
          </div>
        ))}
      </div>

      {keys.length > 0 && (
        <div className="card p-4">
          <div className="font-bold mb-2">Bevétel / Kiadás / Profit {isAllMode && '(évenként)'}</div>
          <ChartCanvas type="bar" height={220} data={{
            labels: keys.map(k=> isMonthMode ? k.split('-')[2] : isAllMode ? k : HU_MONTHS[Number(k.split('-')[1])-1]),
            datasets: [
              { label:'Bevétel', data: revByKey, backgroundColor: PALETTE.grass },
              { label:'Kiadás', data: expByKey, backgroundColor: PALETTE.dusty },
              { label:'Profit', data: profitByKey, backgroundColor: PALETTE.sky },
            ]
          }} options={{ responsive:true, maintainAspectRatio:false, plugins:{legend:{labels:{color:'var(--text)'}}}, scales:{x:{ticks:{color:'var(--text-dim)'}},y:{ticks:{color:'var(--text-dim)'}}} }} />
        </div>
      )}

      <div className="card p-5">
        <div className="flex items-start justify-between mb-3">
          <div>
            <span className="chip" style={{background:'var(--peony)', color:'var(--cacao)'}}>Kiadás megoszlás</span>
            <div className="text-2xl font-extrabold mt-2">{fmtHUF(totalExpense)}</div>
          </div>
        </div>
        {totalExpense === 0 ? <EmptyState icon="card" text="Nincs még kiadás." /> : (
          <>
            <ChartCanvas type="doughnut" height={200} data={{ labels: expenseCategories, datasets:[{ data: catTotals, backgroundColor: CHART_COLORS, borderWidth:0 }] }}
              options={{ responsive:true, maintainAspectRatio:false, cutout:'68%', plugins:{legend:{display:false}} }} />
            <div className="flex flex-wrap gap-2 mt-3">
              {expenseCategories.map((c,i) => catTotals[i] > 0 && (
                <span key={c} className="chip flex items-center gap-1.5" style={{background:'var(--bg)'}}>
                  <span className="w-2.5 h-2.5 rounded-full" style={{background:CHART_COLORS[i%CHART_COLORS.length]}}></span>{c}
                </span>
              ))}
            </div>
          </>
        )}
      </div>

      <div className="card p-5">
        <div className="flex items-start justify-between mb-3">
          <div>
            <span className="chip" style={{background:'var(--lavender)', color:'var(--cacao)'}}>Bevétel csatornák szerint</span>
            <div className="text-2xl font-extrabold mt-2">{fmtHUF(totalRevenue)}</div>
          </div>
        </div>
        {channelTotals.length === 0 ? <EmptyState icon="wallet" text="Nincs még bevétel." /> : (
          <>
            <ChartCanvas type="doughnut" height={200} data={{ labels: channelTotals.map(c=>c.name), datasets:[{ data: channelTotals.map(c=>c.total), backgroundColor: CHART_COLORS, borderWidth:0 }] }}
              options={{ responsive:true, maintainAspectRatio:false, cutout:'68%', plugins:{legend:{display:false}} }} />
            <div className="flex flex-wrap gap-2 mt-3">
              {channelTotals.map((c,i) => (
                <span key={c.id} className="chip flex items-center gap-1.5" style={{background:'var(--bg)'}}>
                  <span className="w-2.5 h-2.5 rounded-full" style={{background:CHART_COLORS[i%CHART_COLORS.length]}}></span>{c.name}
                </span>
              ))}
            </div>
          </>
        )}
      </div>

      <div>
        <div className="flex items-center justify-between mb-3">
          <div className="font-bold">Top termékek</div>
        </div>
        {topProducts.length === 0 ? <EmptyState icon="star" text="Nincs még eladás." /> : (
          <div className="flex gap-3 overflow-x-auto pb-1">
            {topProducts.map(([name,val],i) => (
              <div key={name} className="card p-4 flex-shrink-0" style={{minWidth:150}}>
                <div className="icon-circle w-9 h-9 mb-3" style={{background: CHART_COLORS[i%CHART_COLORS.length]+'33', color: CHART_COLORS[i%CHART_COLORS.length]}}><Icon name="star" size={16} /></div>
                <div className="text-sm font-semibold truncate">{name}</div>
                <div className="font-extrabold mt-1">{fmtHUF(val)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {marginRows.length > 0 && (
        <div className="card p-4">
          <div className="font-bold mb-3">Termékenkénti anyagköltség és haszonkulcs</div>
          <div className="space-y-2">
            {marginRows.map(m => (
              <div key={m.name} className="flex items-center justify-between text-sm gap-2">
                <span className="truncate flex-1">{m.name}</span>
                <span style={{color:'var(--text-dim)'}}>ár {fmtHUF(m.price)}</span>
                <span style={{color:PALETTE.dusty}}>anyag {fmtHUF(m.cost)}</span>
                <span className="font-bold flex-shrink-0" style={{color: m.marginPct>=0?PALETTE.grass:'var(--danger)'}}>{m.marginPct.toFixed(0)}%</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {topTags.length > 0 && (
        <div>
          <div className="font-bold mb-3">Népszerű címkék</div>
          <div className="flex flex-wrap gap-2">
            {topTags.map(([tag,count]) => (
              <span key={tag} className="chip" style={{background:'var(--bg)'}}>{tag} <b>· {count}</b></span>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function Notes({ business, notes, onSave, onDelete }) {
  const [sheetOpen, setSheetOpen] = useState(false);
  const [editing, setEditing] = useState(null);
  const [text, setText] = useState('');

  const openNew = () => { setEditing(null); setText(''); setSheetOpen(true); };
  const openEdit = (n) => { setEditing(n); setText(n.text); setSheetOpen(true); };

  const sorted = [...notes].sort((a,b) => (b.pinned - a.pinned) || b.date.localeCompare(a.date));

  return (
    <div className="fade-in p-4 pb-28 space-y-4">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-extrabold">Jegyzetek</h1>
        <button onClick={openNew} className="btn-primary icon-circle w-10 h-10"><Icon name="plus" size={18} /></button>
      </div>
      {sorted.length === 0 ? <EmptyState icon="note" text="Még nincs jegyzet." /> : (
        <div className="space-y-2">
          {sorted.map(n => (
            <div key={n.id} className="card p-3" onClick={()=>openEdit(n)}>
              <div className="flex items-center justify-between mb-1">
                <span className="text-xs" style={{color:'var(--text-dim)'}}>{fmtDate(n.date)}</span>
                {n.pinned && <span style={{color:'var(--cacao)'}}><Icon name="pin" size={14} /></span>}
              </div>
              <div className="text-sm whitespace-pre-wrap">{n.text}</div>
            </div>
          ))}
        </div>
      )}
      <BottomSheet open={sheetOpen} onClose={()=>setSheetOpen(false)} title={editing ? 'Jegyzet szerkesztése' : 'Új jegyzet'}>
        <textarea className="input min-h-[120px]" value={text} onChange={e=>setText(e.target.value)} placeholder="Írj egy jegyzetet…" />
        <label className="flex items-center gap-2 mt-3 text-sm">
          <input type="checkbox" defaultChecked={editing?.pinned} id="pin-cb" /> Kitűzés
        </label>
        <button className="btn-primary w-full py-3 rounded-2xl font-bold mt-3" onClick={()=>{
          if (!text.trim()) return;
          const pinned = document.getElementById('pin-cb').checked;
          onSave({ id: editing?.id||uid(), businessId: business.id, date: editing?.date||todayISO(), text, pinned });
          setSheetOpen(false);
        }}>Mentés</button>
        {editing && <button className="w-full text-center text-sm mt-3 py-2" style={{color:'var(--danger)'}} onClick={async ()=>{ if (!(await confirmDialog('Biztosan törlöd ezt a jegyzetet?'))) return; onDelete(editing.id); setSheetOpen(false); }}>Törlés</button>}
      </BottomSheet>
    </div>
  );
}
